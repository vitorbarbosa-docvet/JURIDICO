<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Subsídios — Jurídico Pitzi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c2438; --ink-2:#333d55; --ink-3:#5a6480;
  --paper-bg:#e9ebf1; --paper:#fffdf9; --paper-edge:#e3ddd0;
  --rule:#d8dbe3; --rule-2:#eceef2;
  --wine:#7a2331; --wine-2:#9c3a47; --wine-bg:#f7e9ea;
  --brass:#a9863f; --brass-2:#cdb06a; --brass-bg:#f6efdd;
  --ok:#3f6b4f; --ok-bg:#e9f2ec;
  --ph:#b7bccb;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --serif:'Source Serif 4',Georgia,'Times New Roman',serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --radius:3px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--sans); color:var(--ink); background:var(--paper-bg);
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
::selection{background:var(--brass-2);color:#fff;}

/* ---------- layout ---------- */
.app{height:100vh;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;gap:18px;padding:12px 20px;
  background:var(--ink);color:#f1efe6;flex:0 0 auto;
  border-bottom:3px solid var(--brass);
}
.topbar .brand{display:flex;flex-direction:column;line-height:1.15;}
.topbar .brand b{font-size:15.5px;letter-spacing:.2px;}
.topbar .brand span{font-size:11px;color:#b9c0d6;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;}
.seal{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--brass-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  font-weight:700;font-size:15px;color:var(--brass-2);flex:0 0 auto;
}
.topbar .spacer{flex:1;}
.tipo-toggle{display:flex;background:#131a2b;border-radius:20px;padding:3px;border:1px solid #333d55;}
.tipo-toggle button{
  border:none;background:transparent;color:#9aa2ba;padding:7px 14px;border-radius:16px;
  font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;
}
.tipo-toggle button.active{background:var(--wine);color:#fff;}
.btn-ghost-top{
  background:transparent;border:1px solid #454f6b;color:#d8dce6;padding:7px 12px;
  border-radius:20px;font-size:12.5px;cursor:pointer;font-weight:500;
}
.btn-ghost-top:hover{border-color:var(--brass-2);color:#fff;}

.layout{flex:1;display:grid;grid-template-columns:272px 400px 1fr;min-height:0;}
.rail,.form-panel,.doc-panel{min-height:0;overflow-y:auto;}
.rail{background:#f2f1ec;border-right:1px solid var(--paper-edge);}
.form-panel{background:#fbfbf9;border-right:1px solid var(--rule);}
.doc-panel{background:var(--paper-bg);}

/* ---------- rail / index ---------- */
.rail-head{padding:16px 16px 8px;}
.rail-head input[type=search]{
  width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:var(--radius);
  background:#fff;font-size:12.5px;
}
.rail-group{padding:6px 0 10px;}
.rail-group h4{
  margin:14px 16px 4px;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;
  color:var(--ink-3);font-family:var(--mono);font-weight:600;
}
.rail-item{
  display:flex;gap:10px;align-items:flex-start;padding:8px 16px;cursor:pointer;
  border-left:3px solid transparent;
}
.rail-item:hover{background:#e8e6de;}
.rail-item.active{background:var(--paper);border-left-color:var(--wine);}
.rail-item .num{
  font-family:var(--mono);font-size:10.5px;color:var(--brass);font-weight:600;
  padding-top:2px;flex:0 0 auto;width:16px;
}
.rail-item .lbl{font-size:12.7px;line-height:1.35;font-weight:500;color:var(--ink-2);}
.rail-item.active .lbl{color:var(--ink);font-weight:600;}

/* ---------- form panel ---------- */
.form-empty{padding:40px 28px;color:var(--ink-3);}
.form-empty h2{font-family:var(--serif);font-size:20px;color:var(--ink);margin:0 0 10px;}
.form-empty p{font-size:13.5px;line-height:1.6;}
.fp-head{padding:18px 22px 10px;border-bottom:1px solid var(--rule);}
.fp-head .eyebrow{font-family:var(--mono);font-size:10.5px;color:var(--wine);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.fp-head h3{margin:4px 0 6px;font-family:var(--serif);font-size:19px;}
.fp-head p{margin:0;font-size:12.5px;color:var(--ink-3);line-height:1.5;}
.fp-body{padding:6px 22px 40px;}
.fieldset{margin-top:18px;}
.fieldset > h5{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);
  font-family:var(--mono);font-weight:600;margin:0 0 10px;border-bottom:1px solid var(--rule-2);padding-bottom:6px;
}
.field{margin-bottom:11px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:3px;}
.field .hint{font-size:11px;color:var(--ink-3);margin-top:2px;}
.field input[type=text],.field input[type=date],.field input[type=number],.field select,.field textarea{
  width:100%;padding:7px 9px;border:1px solid var(--rule);border-radius:var(--radius);
  background:#fff;font-size:12.8px;
}
.field textarea{min-height:56px;resize:vertical;line-height:1.4;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--wine-2);box-shadow:0 0 0 3px var(--wine-bg);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.ramo-list{display:flex;flex-direction:column;gap:8px;}
.ramo-opt{
  border:1px solid var(--rule);border-radius:var(--radius);padding:9px 11px;cursor:pointer;background:#fff;
}
.ramo-opt:hover{border-color:var(--brass-2);}
.ramo-opt.sel{border-color:var(--wine);background:var(--wine-bg);}
.ramo-opt .r-top{display:flex;gap:8px;align-items:flex-start;}
.ramo-opt input{margin-top:3px;}
.ramo-opt .r-label{font-size:12.7px;font-weight:600;line-height:1.35;}
.ramo-opt .r-docs{font-size:11px;color:var(--ink-3);margin:4px 0 0 22px;font-family:var(--mono);}

.docs-check{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.doc-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;border:1px dashed var(--rule);border-radius:var(--radius);background:#fff;}
.doc-row .tag{
  font-family:var(--mono);font-size:10.5px;background:var(--brass-bg);color:var(--brass);
  padding:1px 6px;border-radius:10px;font-weight:700;flex:0 0 auto;
}
.doc-row.done{border-style:solid;border-color:var(--ok);background:var(--ok-bg);}
.doc-row .name{flex:1;}
.doc-row button{
  font-size:10.5px;border:1px solid var(--rule);background:#fff;border-radius:12px;
  padding:2px 9px;cursor:pointer;font-weight:600;color:var(--ink-2);
}
.doc-row.done button{color:var(--wine);border-color:var(--wine-2);}

.ref-note{margin-top:14px;font-size:11px;color:var(--ink-3);font-style:italic;border-left:2px solid var(--brass-2);padding-left:9px;}

/* ---------- document panel ---------- */
.dp-toolbar{
  position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;
  padding:10px 22px;background:var(--paper-bg);border-bottom:1px solid var(--paper-edge);
}
.dp-toolbar .spacer{flex:1;}
.tbtn{
  border:1px solid var(--ink-3);background:#fff;color:var(--ink-2);padding:6px 12px;
  border-radius:16px;font-size:12px;cursor:pointer;font-weight:600;display:flex;gap:6px;align-items:center;
}
.tbtn:hover{border-color:var(--wine);color:var(--wine);}
.tbtn.primary{background:var(--wine);border-color:var(--wine);color:#fff;}
.tbtn.primary:hover{background:var(--wine-2);}
.tbtn.on{background:var(--ink);border-color:var(--ink);color:#fff;}

.doc-wrap{padding:26px 34px 90px;display:flex;justify-content:center;}
.page{
  width:100%;max-width:760px;background:var(--paper);
  box-shadow:0 1px 2px rgba(28,36,56,.06),0 10px 30px rgba(28,36,56,.14);
  border:1px solid var(--paper-edge);position:relative;padding:56px 58px 64px;
  font-family:var(--serif);font-size:14.5px;line-height:1.68;color:#20263a;
}
.page[contenteditable="true"]{outline:2px dashed var(--brass-2);outline-offset:8px;}
.page h1.doctitle{font-size:15px;font-weight:700;text-align:right;font-family:var(--sans);margin:0 0 26px;color:var(--ink-2);}
.page .addr-block{margin-bottom:22px;}
.page .addr-block .to{font-size:13.5px;color:var(--ink-3);font-family:var(--sans);}
.page p{margin:0 0 14px;text-align:justify;}
.page h2.sec{
  font-family:var(--sans);font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--wine);font-weight:700;margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--rule-2);
}
.page .kv{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-family:var(--sans);font-size:13px;margin-bottom:4px;}
.page .kv b{color:var(--ink-3);font-weight:600;}
.page .sign{margin-top:48px;text-align:center;}
.page .sign .line{border-top:1px solid var(--ink-3);width:260px;margin:0 auto 6px;}
.ph{color:var(--wine-2);background:var(--wine-bg);padding:0 4px;border-radius:2px;font-style:normal;font-family:var(--sans);font-size:12.5px;}

/* exhibit tabs */
.exhibit{display:block;margin:6px 0 18px;}
.exhibit-box{
  border:1.5px dashed var(--brass-2);border-radius:6px;background:var(--brass-bg);
  padding:14px;display:flex;align-items:center;gap:12px;font-family:var(--sans);
}
.exhibit-box .num{
  width:30px;height:30px;border-radius:50%;background:var(--brass);color:#fff;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--mono);
}
.exhibit-box .lbl{flex:1;font-size:12.5px;color:#5a4b28;}
.exhibit-box .lbl b{display:block;color:var(--ink);font-size:12.5px;}
.exhibit-box button{
  background:var(--ink);color:#fff;border:none;padding:6px 12px;border-radius:14px;
  font-size:11.5px;cursor:pointer;font-weight:600;
}
.exhibit-filled{border:1px solid var(--rule);border-radius:6px;overflow:hidden;background:#fff;}
.exhibit-filled .cap{
  display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ok-bg);font-family:var(--sans);font-size:11.5px;
}
.exhibit-filled .cap .num{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;font-family:var(--mono);}
.exhibit-filled .cap b{flex:1;color:var(--ink);}
.exhibit-filled .cap button{background:transparent;border:1px solid var(--rule);border-radius:12px;padding:2px 9px;font-size:10.5px;cursor:pointer;color:var(--ink-3);}
.exhibit-filled img{display:block;max-width:100%;max-height:420px;object-fit:contain;margin:0 auto;background:#f4f4f2;}

.empty-doc{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-3);text-align:center;padding:60px;}
.empty-doc .inner{max-width:340px;}
.empty-doc .glyph{font-family:var(--serif);font-size:44px;color:var(--brass-2);margin-bottom:10px;}
.empty-doc h3{font-family:var(--serif);font-size:19px;color:var(--ink);margin:0 0 8px;}
.empty-doc p{font-size:13px;line-height:1.6;}

.reqs-table{width:100%;font-family:var(--sans);font-size:13px;margin:6px 0 4px;border-collapse:collapse;}
.reqs-table td{padding:3px 0;}
.reqs-table td.v{text-align:right;font-family:var(--mono);}
.reqs-table tr.total td{border-top:1px solid var(--ink-3);font-weight:700;padding-top:6px;}

@media (max-width:1100px){
  .layout{grid-template-columns:1fr;grid-auto-rows:min-content;}
  .rail,.form-panel,.doc-panel{display:none;border:none;}
  .rail.mobile-show,.form-panel.mobile-show,.doc-panel.mobile-show{display:block;}
  .mobiletabs{display:flex;background:#fff;border-bottom:1px solid var(--rule);}
  .mobiletabs button{flex:1;border:none;background:transparent;padding:11px;font-size:12px;font-weight:700;color:var(--ink-3);border-bottom:3px solid transparent;}
  .mobiletabs button.active{color:var(--wine);border-color:var(--wine);}
  .doc-wrap{padding:16px;}
  .page{padding:30px 20px;}
}
@media (min-width:1101px){.mobiletabs{display:none;}}

@media print{
  .topbar,.rail,.form-panel,.dp-toolbar,.mobiletabs{display:none !important;}
  .layout{display:block;}
  .doc-panel{overflow:visible;background:#fff;}
  .doc-wrap{padding:0;}
  .page{box-shadow:none;border:none;max-width:100%;}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="seal">P</div>
    <div class="brand"><b>Gerador de Subsídios</b><span>Jurídico · Pitzi</span></div>
    <div class="spacer"></div>
    <div class="tipo-toggle" id="tipoToggle">
      <button data-action="set-tipo" data-tipo="procon">PROCON</button>
      <button data-action="set-tipo" data-tipo="judicial">Subsídio Judicial</button>
    </div>
    <button class="btn-ghost-top" data-action="novo-caso">+ Novo caso</button>
  </div>

  <div class="mobiletabs" id="mobileTabs">
    <button data-action="mobile-tab" data-tab="rail" class="active">Motivo</button>
    <button data-action="mobile-tab" data-tab="form">Dados</button>
    <button data-action="mobile-tab" data-tab="doc">Documento</button>
  </div>

  <div class="layout">
    <div class="rail mobile-show" id="rail"></div>
    <div class="form-panel" id="formPanel"></div>
    <div class="doc-panel" id="docPanel"></div>
  </div>

</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
/* =========================================================================
   GERADOR DE SUBSÍDIOS — motor + dados
   ========================================================================= */

const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function esc(s){
  return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function V(val, ph){
  const s = (val===undefined||val===null?'':String(val)).trim();
  return s ? esc(s) : `<span class="ph">${esc(ph)}</span>`;
}
function D(val, ph){
  if(!val) return `<span class="ph">${esc(ph||'data')}</span>`;
  const [y,m,d] = val.split('-').map(Number);
  if(!y||!m||!d) return esc(val);
  return `${String(d).padStart(2,'0')} de ${MESES[m-1]} de ${y}`;
}
function todayLong(){
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function slot(id){ return `<div class="exhibit" data-slot="${id}"></div>`; }

/* Shared "abertura dos FATOS" — comum a quase todos os modelos */
function aberturaFatos(v){
  return `<p>A parte ${V(v.tratamento,'autora/consumidora')} adquiriu da PITZI plano de proteção para o aparelho modelo ${V(v.modeloAparelho,'modelo do aparelho')}, IMEI: ${V(v.imei,'nº do IMEI')}, n${'ª'} ${V(v.source,'loja/canal de venda')}, em ${D(v.dataAquisicao,'data de aquisição')}.</p>`;
}

const FECHAMENTO_BOAFE = `<p>Nesse sentido, entende a PITZI ter agido com clareza e boa-fé objetiva desde o início na resolução do caso, não havendo que se falar em danos materiais ou morais em desfavor da parte reclamante.</p>`;

const SOBRE_FORNECEDORA = (v) => `<p>A fornecedora PITZI é uma empresa especializada em recondicionamento, reparação, compra, venda e comercialização de aparelhos celulares, smartphones e tablets. Com atuação há mais de 13 anos na estruturação de produtos e serviços relacionados à excelência operacional de programas de seguros, representa as principais seguradoras do país, entre elas ${V(v.seguradoras,'GAZIN, GENERALI e MAPFRE')}.</p>`;

/* =========================================================================
   MOTIVOS (18) — cada um com: id, grupo, numero, titulo, quandoUsar,
   alegacaoDefault, camposExtras[], baseCasos, ramos[{id,label,docs[],texto(v)}]
   ========================================================================= */
const MOTIVOS = [];

/* ---- helper to push categories ---- */
function addMotivo(m){ MOTIVOS.push(m); }

/* ============================= GRUPO 1: CONTRATAÇÃO E VENDAS ============================= */

addMotivo({
  id:'nao_reconhece', numero:'01', grupo:'Contratação e Vendas',
  titulo:'Não reconhece a contratação/proteção',
  quandoUsar:'Consumidor alega desconhecer integralmente a contratação da proteção ou Garantia Estendida, pedindo estorno e indenização por danos morais.',
  alegacaoDefault:'A parte sustenta, em síntese, desconhecer a contratação da proteção objeto da lide, alegando ausência de consentimento livre e informado, bem como postula a restituição de valores e a indenização por danos morais.',
  baseCasos:'Sueellen Louise Severo · Leandro da Conceição de Jesus · Jonatas Oliveira dos Santos · Sonia Gracia Pucci Medina',
  camposExtras:[
    {key:'canal', label:'Canal de venda', type:'select', options:['Loja física (varejo)','Amazon GE (marketplace)','Mercado Livre'], default:'Amazon GE (marketplace)'},
    {key:'valorPremio', label:'Valor do prêmio (R$)', type:'text', ph:'ex.: 21,00'},
    {key:'lmi', label:'Limite Máximo de Indenização — LMI (R$)', type:'text'},
    {key:'vigenciaIni', label:'Início da vigência', type:'date'},
    {key:'vigenciaFim', label:'Fim da vigência', type:'date'},
  ],
  ramos:[
    { id:'loja_fisica', label:'Loja física — comprovante emitido no ato + e-mail de acesso à conta',
      docs:[{id:'d1',label:'Documento comprobatório da contratação (emitido no ato)'},{id:'d2',label:'E-mail de acesso à área logada (customer.io)'}],
      texto:(v)=>`
        <p>No dia da aquisição do plano, foi enviada pela PITZI uma mensagem para o e-mail cadastrado pela parte ${v.tratamento}, disponibilizando um link de acesso à área logada, onde constam o contrato e as condições do plano adquirido, bem como os canais de atendimento para dúvida, cancelamento ou auxílio.</p>
        ${slot('d1')}
        <p>A parte ${v.tratamento} recebeu, no ato da contratação, o documento comprobatório de aquisição do plano, emitido na mesma data, restando comprovadas sua anuência e ciência acerca da contratação e das condições contratuais.</p>
        ${slot('d2')}
        <p>Até a presente data, não há qualquer registro de contato pela parte ${v.tratamento} aos canais de atendimento amplamente divulgados no bilhete e no e-mail, solicitando o cancelamento, reclamação ou auxílio para o plano — solicitação que a fornecedora só veio a tomar conhecimento por meio da presente reclamação.</p>` },
    { id:'amazon', label:'Amazon GE — fluxo de checkbox no checkout (contratação eletrônica regular)',
      docs:[{id:'d1',label:'Print do fluxo de checkout com o checkbox da Garantia Estendida'},{id:'d2',label:'Bilhete de seguro com cobertura, prêmio e vigência'}],
      texto:(v)=>`
        <p>A PITZI atua em parceria com a Amazon Brasil, disponibilizando em sua plataforma planos de Garantia Estendida para produtos eletroeletrônicos, cuja adesão é facultativa e exige manifestação positiva do consumidor no fluxo de compra, mediante seleção da oferta na tela e posterior conclusão do pedido.</p>
        ${slot('d1')}
        <p>Trata-se de fluxo que depende de manifestação positiva do titular da compra para a inclusão da proteção no pedido — não se trata de produto obrigatório, automático ou imposto como condição para aquisição do bem, mas de oferta acessória vinculada a bens elegíveis.</p>
        <p>No caso em tela, o bilhete de seguro registra expressamente a contratação de cobertura de "Defeito de Fábrica (Garantia Estendida)", com limite máximo de indenização de R$ ${V(v.lmi,'valor do LMI')} e prêmio total de R$ ${V(v.valorPremio,'valor do prêmio')}, com vigência de ${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}.</p>
        ${slot('d2')}
        <p>A mera alegação unilateral de desconhecimento não é apta, por si só, a invalidar a contratação eletrônica impugnada, sendo indispensável a demonstração concreta de fraude, uso indevido de dados pessoais, acesso irregular à conta ou falha sistêmica da plataforma, circunstâncias que não se verificam no presente caso. Subsidiariamente, ainda que não tenha sido a própria parte ${v.tratamento} quem materialmente concluiu a operação, subsiste a possibilidade de que a aquisição tenha sido realizada por pessoa de sua confiança, com acesso consentido às suas credenciais, o que não caracteriza contratação viciada nem irregularidade imputável à fornecedora.</p>
        <p>Não há, ainda, demonstração de qualquer contato administrativo prévio e específico perante a PITZI relativo a este contrato, o que revela o acionamento prematuro do órgão de defesa do consumidor, sem oportunizar a verificação administrativa da divergência.</p>` },
    { id:'meli', label:'Mercado Livre — contratação vinculada à compra no marketplace',
      docs:[{id:'d1',label:'Comprovante de contratação anexado pela parte'}],
      texto:(v)=>`

addMotivo({

      docs:[{id:'d1',label:'Bilhete com a vigência'},{id:'d2',label:'Nota fiscal + Termo de Garantia do fabricante'},{id:'d3',label:'Processo SUSEP do produto (consulta pública)'}],
      texto:(v)=>`
        <p>O bilhete de proteção estabelece a vigência da cobertura específica para o período de ${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}. Esta delimitação temporal é essencial ao contrato de proteção, que define o período de cobertura da Garantia Estendida.</p>
        ${slot('d1')}
        <p>A distinção entre a data de emissão da proteção (${D(v.dataEmissaoBilhete,'emissão')}) e a vigência da cobertura encontra respaldo na natureza específica do produto contratado: a Garantia Estendida tem por finalidade complementar a garantia legal e contratual do fabricante, iniciando sua eficácia apenas após o término desta. No caso concreto, o produto ${V(v.fabricante,'fabricante')} possui garantia contratual de ${V(v.garantiaFabricanteAnos,'prazo')}, contada da entrega, conforme nota fiscal e certificado de garantia do fabricante.</p>
        ${slot('d2')}
        <p>Em contato realizado pela parte ${v.tratamento} (protocolo n.º ${V(v.protocoloContato,'nº do protocolo')}), a fornecedora prontamente solicitou o comprovante da garantia do fabricante e a nota fiscal do produto, tendo sido aberto chamado interno para retificação da vigência do contrato junto à seguradora. Esta prática não configura recusa de cobertura, mas orientação técnica adequada, já que a garantia de fábrica cobre exclusivamente defeitos funcionais decorrentes de falhas no processo de fabricação, não abrangendo danos por mau uso, desgaste natural ou acidentes.</p>
        <p>O contrato de proteção foi estruturado em consonância com as diretrizes da Superintendência de Seguros Privados (SUSEP), disponíveis para consulta pública no sítio eletrônico da autarquia, o qual estabelece com clareza os riscos cobertos, excluídos e as condições de acionamento da Garantia Estendida.</p>
        ${slot('d3')}` },
    { id:'sem_contato', label:'Sem contato prévio do consumidor — vigência do bilhete permanece válida',

      texto:(v)=>`
        <p>O bilhete de seguro apresentado pela parte ${v.tratamento} estabelece vigência da cobertura para o período de ${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}, o que não configura cláusula abusiva, mas elemento essencial do contrato que define o início de eficácia da Garantia Estendida após o término da garantia do fabricante ${V(v.fabricante,'fabricante')}, de ${V(v.garantiaFabricanteAnos,'prazo')}.</p>
        ${slot('d1')}
        <p>O art. 47 do CDC determina que cláusulas ambíguas sejam interpretadas favoravelmente ao consumidor; contudo, no presente caso não há ambiguidade na redação contratual, que especifica com clareza os períodos de vigência. Tampouco se identifica, nos autos, qualquer tentativa de acionamento da cobertura por parte da parte ${v.tratamento} junto aos canais de atendimento disponibilizados — ônus da prova que lhe incumbe, nos termos do art. 373, I, do CPC.</p>
        <p>O contrato foi estruturado em consonância com as diretrizes da SUSEP, disponíveis para consulta pública, que estabelecem com clareza os riscos cobertos, excluídos e as condições de acionamento.</p>
        ${slot('d2')}
        <p>Ausente qualquer ato ilícito da seguradora ou nexo causal com os alegados danos, a mera existência de defeito no produto ainda sob garantia de fábrica não configura responsabilidade da seguradora ou de suas representantes.</p>` },
  ]
});

<script>
/* =========================================================================
   CAMPOS COMUNS E POR TIPO DE PEÇA
   ========================================================================= */
const COMMON_FIELDS = [
  {key:'nome', label:'Nome completo do consumidor', type:'text'},
  {key:'cpf', label:'CPF', type:'text', ph:'000.000.000-00'},
  {key:'cadastro', label:'Cadastro / Order (nº ou link)', type:'text'},
  {key:'source', label:'Loja / canal de venda', type:'text', ph:'ex.: Amazon GE, Mercado Livre, nome da loja'},
  {key:'modeloAparelho', label:'Modelo do aparelho', type:'text'},
  {key:'imei', label:'IMEI', type:'text'},
  {key:'dataAquisicao', label:'Data de aquisição do plano', type:'date'},
];
const PROCON_FIELDS = [
  {key:'nomeProcon', label:'PROCON de destino', type:'text', ph:'ex.: PROCON SP'},
  {key:'enderecoProcon', label:'Endereço do PROCON', type:'textarea', ph:'opcional'},
  {key:'faCip', label:'FA / CIP / Nº de atendimento', type:'text'},
  {key:'seguradoras', label:'Seguradoras representadas (institucional)', type:'text', default:'GAZIN, GENERALI e MAPFRE'},
  {key:'assinante', label:'Assinatura', type:'text', default:'Jurídico Pitzi'},
];
const JUDICIAL_FIELDS = [
  {key:'destinatarios', label:'Destinatários (escritório)', type:'text', default:'nreis@viseu.com.br; cadastrodigital@viseu.com.br; gmurakami@viseu.com.br; juridico@pitzi.com.br'},
  {key:'numeroProcesso', label:'Nº do processo (se houver)', type:'text', ph:'opcional'},
  {key:'assinante', label:'Assinatura', type:'text', default:'Jurídico Pitzi'},
];

/* =========================================================================
   ESTADO
   ========================================================================= */
const state = {
  tipo:'procon', motivoId:null, ramoId:null,
  vars:{}, images:{}, editMode:false, search:'', mobileTab:'rail', pendingSlot:null,
};

function currentMotivo(){ return MOTIVOS.find(m=>m.id===state.motivoId) || null; }
function currentRamo(){ const m=currentMotivo(); if(!m) return null; return m.ramos.find(r=>r.id===state.ramoId) || m.ramos[0]; }
function computedVars(){ return Object.assign({}, state.vars, { tratamento: state.tipo==='procon' ? 'consumidora' : 'autora' }); }

function parseMoney(s){
  if(!s) return 0;
  const n = String(s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',', '.');
  const f = parseFloat(n);
  return isNaN(f) ? 0 : f;
}
function formatMoney(n){
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* =========================================================================
   BLOCOS DE DOCUMENTO (cabeçalho / fechamento — comuns a todos os motivos)
   ========================================================================= */
function proconHeader(v, m){
  const endereco = v.enderecoProcon ? esc(v.enderecoProcon).replace(/\n/g,'<br>') : '';
  return `
    <h1 class="doctitle">São Paulo, ${todayLong()}</h1>
    <div class="addr-block">
      <div class="to">À<br>${V(v.nomeProcon,'nome do PROCON')}${endereco?('<br>'+endereco):''}</div>
    </div>
    <p style="font-family:var(--sans);font-size:12.5px;color:var(--ink-3)">FA/CIP/Nº de Atendimento: ${V(v.faCip,'nº do atendimento')}</p>
    <p><b>${V(v.nome,'NOME DO CONSUMIDOR')}</b>, CPF: ${V(v.cpf,'nº do CPF')}, apresentou reclamação em face da fornecedora PITZI REPARAÇÃO E MANUTENÇÃO DE EQUIPAMENTOS ELETRÔNICOS LTDA, CNPJ: 13.403.189/0001-05.</p>
    <h2 class="sec">Sobre a fornecedora</h2>
    ${SOBRE_FORNECEDORA(v)}
    <h2 class="sec">Alegações iniciais</h2>
    <p>${esc(v.alegacao || m.alegacaoDefault)}</p>`;
}

function judicialHeader(v, m){
  return `
    <p style="font-family:var(--sans);font-size:11.5px;color:var(--ink-3)">Para: ${V(v.destinatarios,'e-mails do escritório responsável')}</p>
    <h2 class="sec">Parte autora</h2>
    <div class="kv"><b>Nome:</b><span>${V(v.nome,'nome completo')}</span></div>
    <div class="kv"><b>CPF:</b><span>${V(v.cpf,'nº do CPF')}</span></div>
    <div class="kv"><b>Cadastro:</b><span>${V(v.cadastro,'nº do pedido / order')}</span></div>
    <div class="kv"><b>Source:</b><span>${V(v.source,'loja / canal')}</span></div>
    ${v.numeroProcesso? `<div class="kv"><b>Processo:</b><span>${esc(v.numeroProcesso)}</span></div>`:''}
    <h2 class="sec">Alegações da parte autora</h2>
    <p>${esc(v.alegacao || m.alegacaoDefault)}</p>
    <h2 class="sec">Requisições da parte autora</h2>
    ${reqTable(v)}`;
}

function reqTable(v){
  const dm = parseMoney(v.danosMateriais), dmo = parseMoney(v.danosMorais);
  const total = dm + dmo;
  return `<table class="reqs-table">
    <tr><td>1) Obrigação de fazer</td><td class="v">${v.pedidoObrigacaoFazer? esc(v.pedidoObrigacaoFazer) : '—'}</td></tr>
    <tr><td>2) Danos materiais</td><td class="v">R$ ${v.danosMateriais? esc(v.danosMateriais): '0,00'}</td></tr>
    <tr><td>3) Danos morais</td><td class="v">R$ ${v.danosMorais? esc(v.danosMorais): '0,00'}</td></tr>
    <tr class="total"><td>Total dos pedidos</td><td class="v">R$ ${formatMoney(total)}</td></tr>
  </table>`;
}

function signBlock(v){
  return `<div class="sign"><div class="line"></div>${V(v.assinante,'Jurídico Pitzi')}</div>`;
}

function proconClosing(v){
  return `
    <p>Caso a parte consumidora, ou este órgão do PROCON, tenham qualquer dúvida, solicitamos que entrem em contato conosco através do e-mail juridico@pitzi.com.br, ou pelo telefone (11) 2579-0068. Nosso atendimento é de segunda a sexta-feira, das 9h às 18h.</p>
    <p>Sem mais e certos de vossa providência a respeito.</p>
    ${signBlock(v)}`;
}

function buildDocumentHTML(){
  const m = currentMotivo(), r = currentRamo();
  if(!m || !r) return '';
  const v = computedVars();
  let html = state.tipo==='procon' ? proconHeader(v,m) : judicialHeader(v,m);
  html += `<h2 class="sec">Fatos</h2>`;
  html += aberturaFatos(v);
  html += r.texto(v);
  html += FECHAMENTO_BOAFE;
  html += state.tipo==='procon' ? proconClosing(v) : signBlock(v);
  return html;
}

/* =========================================================================
   RENDER — TRILHA DE ÍNDICE (rail)
   ========================================================================= */
function renderRail(){
  const el = document.getElementById('rail');
  const hadFocus = document.activeElement && document.activeElement.dataset && document.activeElement.dataset.field==='__search';
  const selStart = hadFocus ? document.activeElement.selectionStart : null;

  const groups = {};
  MOTIVOS.forEach(m=>{ (groups[m.grupo] = groups[m.grupo] || []).push(m); });
  const q = state.search.trim().toLowerCase();

  let h = `<div class="rail-head"><input type="search" placeholder="Buscar motivo..." value="${esc(state.search)}" data-field="__search"></div>`;
  Object.keys(groups).forEach(g=>{
    const items = groups[g].filter(m => !q || m.titulo.toLowerCase().includes(q) || m.quandoUsar.toLowerCase().includes(q));
    if(!items.length) return;
    h += `<div class="rail-group"><h4>${esc(g)}</h4>`;
    h += items.map(m=>`
      <div class="rail-item ${m.id===state.motivoId?'active':''}" data-action="select-motivo" data-id="${m.id}">
        <span class="num">${m.numero}</span><span class="lbl">${esc(m.titulo)}</span>
      </div>`).join('');
    h += `</div>`;
  });
  el.innerHTML = h;

  if(hadFocus){
    const inp = el.querySelector('[data-field="__search"]');
    if(inp){ inp.focus(); try{ inp.setSelectionRange(selStart, selStart); }catch(e){} }
  }
}

/* =========================================================================
   RENDER — FORMULÁRIO
   ========================================================================= */
function fieldHTML(f){
  const val = state.vars[f.key] !== undefined ? state.vars[f.key] : (f.default || '');
  if(f.type==='select'){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o)}" ${o===val?'selected':''}>${esc(o)}</option>`).join('');
    return `<div class="field"><label>${esc(f.label)}</label><select data-field="${f.key}"><option value="">—</option>${opts}</select></div>`;
  }
  if(f.type==='textarea'){
    return `<div class="field"><label>${esc(f.label)}</label><textarea data-field="${f.key}" placeholder="${esc(f.ph||'')}">${esc(val)}</textarea></div>`;
  }
  const type = f.type==='date' ? 'date' : (f.type==='number' ? 'number' : 'text');
  return `<div class="field"><label>${esc(f.label)}</label><input type="${type}" data-field="${f.key}" value="${esc(val)}" placeholder="${esc(f.ph||'')}"></div>`;
}

function renderForm(){
  const el = document.getElementById('formPanel');
  const m = currentMotivo();
  if(!m){
    el.innerHTML = `<div class="form-empty">
      <h2>Monte o subsídio do caso</h2>
      <p>Escolha um motivo no índice ao lado para começar. O formulário se adapta aos campos, fundamentos e documentos daquele tipo de caso — e o documento à direita é atualizado em tempo real, já no layout padrão de envio.</p>
      <p>Alterne entre <b>PROCON</b> e <b>Subsídio Judicial</b> no topo a qualquer momento: a estrutura do documento se ajusta, mas os dados já preenchidos são mantidos.</p>
    </div>`;
    return;
  }
  const r = currentRamo();
  let h = `<div class="fp-head">
      <div class="eyebrow">Motivo ${m.numero} · ${esc(m.grupo)}</div>
      <h3>${esc(m.titulo)}</h3>
      <p>${esc(m.quandoUsar)}</p>
    </div><div class="fp-body">`;

  h += `<div class="fieldset"><h5>Dados do caso</h5>${COMMON_FIELDS.map(fieldHTML).join('')}</div>`;

  h += `<div class="fieldset"><h5>${state.tipo==='procon' ? 'Peça — PROCON' : 'Peça — subsídio judicial'}</h5>`;
  h += (state.tipo==='procon' ? PROCON_FIELDS : JUDICIAL_FIELDS).map(fieldHTML).join('');
  h += `</div>`;

  h += `<div class="fieldset"><h5>Alegação (${state.tipo==='procon' ? 'inicial / PROCON' : 'da parte autora'})</h5>
    <div class="field"><textarea data-field="alegacao" style="min-height:74px">${esc(state.vars.alegacao !== undefined ? state.vars.alegacao : m.alegacaoDefault)}</textarea></div>
  </div>`;

  if(state.tipo==='judicial'){
    h += `<div class="fieldset"><h5>Requisições da parte autora</h5>`;
    h += fieldHTML({key:'pedidoObrigacaoFazer', label:'Obrigação de fazer', type:'text', ph:'opcional'});
    h += `<div class="two-col">`;
    h += fieldHTML({key:'danosMateriais', label:'Danos materiais (R$)', type:'text', ph:'0,00'});
    h += fieldHTML({key:'danosMorais', label:'Danos morais (R$)', type:'text', ph:'0,00'});
    h += `</div></div>`;
  }

  if(m.camposExtras && m.camposExtras.length){
    h += `<div class="fieldset"><h5>Detalhes específicos do motivo</h5>${m.camposExtras.map(fieldHTML).join('')}</div>`;
  }

  h += `<div class="fieldset"><h5>Fundamento aplicável</h5><div class="ramo-list">`;
  h += m.ramos.map(rm => `
    <div class="ramo-opt ${rm.id===state.ramoId?'sel':''}" data-action="select-ramo" data-id="${rm.id}">
      <div class="r-top"><input type="radio" ${rm.id===state.ramoId?'checked':''} readonly><div class="r-label">${esc(rm.label)}</div></div>
      ${rm.docs.length ? `<div class="r-docs">${rm.docs.length} doc(s): ${rm.docs.map(d=>esc(d.label)).join(' · ')}</div>` : ''}
    </div>`).join('');
  h += `</div></div>`;

  if(r && r.docs.length){
    h += `<div class="fieldset"><h5>Documentos deste fundamento</h5><div class="docs-check">`;
    h += r.docs.map((d,i)=>{
      const num = String(i+1).padStart(2,'0');
      const has = !!state.images[d.id];
      return `<div class="doc-row ${has?'done':''}">
        <span class="tag">Doc.${num}</span><span class="name">${esc(d.label)}</span>
        <button data-action="${has?'remove-doc':'upload-doc'}" data-slot="${d.id}">${has?'Remover':'Anexar'}</button>
      </div>`;
    }).join('');
    h += `</div></div>`;
  }

  h += `<div class="ref-note">Modelo baseado em casos reais: ${esc(m.baseCasos)}</div>`;
  h += `</div>`;
  el.innerHTML = h;
}

/* =========================================================================
   RENDER — DOCUMENTO / EXHIBITS
   ========================================================================= */
function hydrateExhibits(){
  const r = currentRamo(); if(!r) return;
  document.querySelectorAll('#thePage .exhibit[data-slot]').forEach(el=>{
    const slotId = el.dataset.slot;
    const docDef = r.docs.find(d=>d.id===slotId);
    if(!docDef){ el.remove(); return; }
    const idx = r.docs.indexOf(docDef) + 1;
    const num = String(idx).padStart(2,'0');
    const img = state.images[slotId];
    if(img){
      el.innerHTML = `<div class="exhibit-filled">
        <div class="cap"><span class="num">${num}</span><b>Doc. ${num} — ${esc(docDef.label)}</b><button data-action="remove-doc" data-slot="${slotId}">remover</button></div>
        <img src="${img}" alt="Doc. ${num}">
      </div>`;
    } else {
      el.innerHTML = `<div class="exhibit-box">
        <div class="num">${num}</div>
        <div class="lbl"><b>Doc. ${num}</b>${esc(docDef.label)}</div>
        <button data-action="upload-doc" data-slot="${slotId}">Anexar</button>
      </div>`;
    }
  });
}

function renderDoc(){
  const el = document.getElementById('docPanel');
  const m = currentMotivo();
  const toolbar = `<div class="dp-toolbar">
    <button class="tbtn ${state.editMode?'on':''}" data-action="toggle-edit">${state.editMode ? '✓ Editando' : '✎ Editar manualmente'}</button>
    <div class="spacer"></div>
    <button class="tbtn" data-action="copy-doc">⧉ Copiar</button>
    <button class="tbtn primary" data-action="print-doc">🖶 Imprimir / Salvar PDF</button>
  </div>`;
  if(!m){
    el.innerHTML = toolbar + `<div class="empty-doc"><div class="inner">
      <div class="glyph">§</div>
      <h3>Nenhum caso selecionado</h3>
      <p>Escolha um motivo à esquerda para ver o subsídio sendo montado aqui, parágrafo por parágrafo, já no layout padrão de envio.</p>
    </div></div>`;
    return;
  }
  const body = buildDocumentHTML();
  el.innerHTML = toolbar + `<div class="doc-wrap"><div class="page" id="thePage" contenteditable="${state.editMode}">${body}</div></div>`;
  hydrateExhibits();
}

/* =========================================================================
   AÇÕES
   ========================================================================= */
function selectMotivo(id){
  const m = MOTIVOS.find(x=>x.id===id);
  if(!m) return;
  state.motivoId = id;
  state.ramoId = m.ramos[0].id;
  if(state.vars._alegacaoAuto !== false){
    state.vars.alegacao = m.alegacaoDefault;
    state.vars._alegacaoAuto = true;
  }
  (m.camposExtras||[]).forEach(f=>{ if(state.vars[f.key]===undefined && f.default!==undefined) state.vars[f.key]=f.default; });
  renderRail(); renderForm(); renderDoc();
  if(window.innerWidth <= 1100) setMobileTab('form');
}

function renderTipoToggle(){
  document.querySelectorAll('#tipoToggle button').forEach(b=> b.classList.toggle('active', b.dataset.tipo===state.tipo));
}

function setMobileTab(tab){
  state.mobileTab = tab;
  document.querySelectorAll('.mobiletabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('rail').classList.toggle('mobile-show', tab==='rail');
  document.getElementById('formPanel').classList.toggle('mobile-show', tab==='form');
  document.getElementById('docPanel').classList.toggle('mobile-show', tab==='doc');
}

function flashToolbarMsg(msg){
  const btn = document.querySelector('[data-action="copy-doc"]');
  if(!btn) return;
  const old = btn.textContent;
  btn.textContent = msg;
  setTimeout(()=>{ btn.textContent = old; }, 2400);
}

function copyDoc(){
  const page = document.getElementById('thePage');
  if(!page) return;
  const range = document.createRange();
  range.selectNodeContents(page);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){ ok = false; }
  sel.removeAllRanges();
  flashToolbarMsg(ok ? '✓ Copiado — cole no Word ou e-mail' : 'Selecione o texto manualmente para copiar');
}

function resetCase(){
  state.vars = {}; state.images = {}; state.motivoId = null; state.ramoId = null; state.editMode = false;
  initDefaults();
  renderRail(); renderForm(); renderDoc();
  setMobileTab('rail');
}

function initDefaults(){
  if(state.vars.assinante===undefined) state.vars.assinante='Jurídico Pitzi';
  if(state.vars.destinatarios===undefined) state.vars.destinatarios='nreis@viseu.com.br; cadastrodigital@viseu.com.br; gmurakami@viseu.com.br; juridico@pitzi.com.br';
  if(state.vars.seguradoras===undefined) state.vars.seguradoras='GAZIN, GENERALI e MAPFRE';
}

/* =========================================================================
   LISTENERS GLOBAIS (delegação de eventos)
   ========================================================================= */
document.body.addEventListener('input', (e)=>{
  const f = e.target.dataset.field;
  if(!f) return;
  if(f==='__search'){ state.search = e.target.value; renderRail(); return; }
  state.vars[f] = e.target.value;
  if(f==='alegacao') state.vars._alegacaoAuto = false;
  renderDoc();
});

document.body.addEventListener('change', (e)=>{
  const f = e.target.dataset.field;
  if(!f || e.target.tagName!=='SELECT') return;
  state.vars[f] = e.target.value;
  renderDoc();
});

document.body.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  if(action==='select-motivo'){ selectMotivo(btn.dataset.id); }
  else if(action==='select-ramo'){ state.ramoId = btn.dataset.id; renderForm(); renderDoc(); }
  else if(action==='set-tipo'){ state.tipo = btn.dataset.tipo; renderTipoToggle(); renderForm(); renderDoc(); }
  else if(action==='upload-doc'){ state.pendingSlot = btn.dataset.slot; document.getElementById('fileInput').click(); }
  else if(action==='remove-doc'){ delete state.images[btn.dataset.slot]; renderForm(); renderDoc(); }
  else if(action==='toggle-edit'){ state.editMode = !state.editMode; renderDoc(); }
  else if(action==='copy-doc'){ copyDoc(); }
  else if(action==='print-doc'){ window.print(); }
  else if(action==='novo-caso'){ if(confirm('Começar um novo caso? Os dados preenchidos e imagens anexadas serão apagados.')) resetCase(); }
  else if(action==='mobile-tab'){ setMobileTab(btn.dataset.tab); }
});

document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file || !state.pendingSlot) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    state.images[state.pendingSlot] = reader.result;
    state.pendingSlot = null;
    renderForm(); renderDoc();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

/* =========================================================================
   BOOT
   ========================================================================= */
function boot(){
  initDefaults();
  renderTipoToggle();
  renderRail();
  renderForm();
  renderDoc();
}
boot();
</script>
</body>
</html>
