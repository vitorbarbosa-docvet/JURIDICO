<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Subsídios — Jurídico Pitzi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c2438; --ink-2:#333d55; --ink-3:#5a6480;
  --paper-bg:#e9ebf1; --paper:#fffdf9; --paper-edge:#e3ddd0;
  --rule:#d8dbe3; --rule-2:#eceef2;
  --wine:#7a2331; --wine-2:#9c3a47; --wine-bg:#f7e9ea;
  --brass:#a9863f; --brass-2:#cdb06a; --brass-bg:#f6efdd;
  --ok:#3f6b4f; --ok-bg:#e9f2ec;
  --ph:#b7bccb;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --serif:'Source Serif 4',Georgia,'Times New Roman',serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --radius:3px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--sans); color:var(--ink); background:var(--paper-bg);
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
::selection{background:var(--brass-2);color:#fff;}

/* ---------- layout ---------- */
.app{height:100vh;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;gap:18px;padding:12px 20px;
  background:var(--ink);color:#f1efe6;flex:0 0 auto;
  border-bottom:3px solid var(--brass);
}
.topbar .brand{display:flex;flex-direction:column;line-height:1.15;}
.topbar .brand b{font-size:15.5px;letter-spacing:.2px;}
.topbar .brand span{font-size:11px;color:#b9c0d6;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;}
.seal{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--brass-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  font-weight:700;font-size:15px;color:var(--brass-2);flex:0 0 auto;
}
.topbar .spacer{flex:1;}
.tipo-toggle{display:flex;background:#131a2b;border-radius:20px;padding:3px;border:1px solid #333d55;}
.tipo-toggle button{
  border:none;background:transparent;color:#9aa2ba;padding:7px 14px;border-radius:16px;
  font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;
}
.tipo-toggle button.active{background:var(--wine);color:#fff;}
.btn-ghost-top{
  background:transparent;border:1px solid #454f6b;color:#d8dce6;padding:7px 12px;
  border-radius:20px;font-size:12.5px;cursor:pointer;font-weight:500;
}
.btn-ghost-top:hover{border-color:var(--brass-2);color:#fff;}

.layout{flex:1;display:grid;grid-template-columns:272px 400px 1fr;min-height:0;}
.rail,.form-panel,.doc-panel{min-height:0;overflow-y:auto;}
.rail{background:#f2f1ec;border-right:1px solid var(--paper-edge);}
.form-panel{background:#fbfbf9;border-right:1px solid var(--rule);}
.doc-panel{background:var(--paper-bg);}

/* ---------- rail / index ---------- */
.rail-head{padding:16px 16px 8px;}
.rail-head input[type=search]{
  width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:var(--radius);
  background:#fff;font-size:12.5px;
}
.rail-group{padding:6px 0 10px;}
.rail-group h4{
  margin:14px 16px 4px;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;
  color:var(--ink-3);font-family:var(--mono);font-weight:600;
}
.rail-item{
  display:flex;gap:10px;align-items:flex-start;padding:8px 16px;cursor:pointer;
  border-left:3px solid transparent;
}
.rail-item:hover{background:#e8e6de;}
.rail-item.active{background:var(--paper);border-left-color:var(--wine);}
.rail-item .num{
  font-family:var(--mono);font-size:10.5px;color:var(--brass);font-weight:600;
  padding-top:2px;flex:0 0 auto;width:16px;
}
.rail-item .lbl{font-size:12.7px;line-height:1.35;font-weight:500;color:var(--ink-2);}
.rail-item.active .lbl{color:var(--ink);font-weight:600;}

/* ---------- form panel ---------- */
.form-empty{padding:40px 28px;color:var(--ink-3);}
.form-empty h2{font-family:var(--serif);font-size:20px;color:var(--ink);margin:0 0 10px;}
.form-empty p{font-size:13.5px;line-height:1.6;}
.fp-head{padding:18px 22px 10px;border-bottom:1px solid var(--rule);}
.fp-head .eyebrow{font-family:var(--mono);font-size:10.5px;color:var(--wine);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.fp-head h3{margin:4px 0 6px;font-family:var(--serif);font-size:19px;}
.fp-head p{margin:0;font-size:12.5px;color:var(--ink-3);line-height:1.5;}
.fp-body{padding:6px 22px 40px;}
.fieldset{margin-top:18px;}
.fieldset > h5{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);
  font-family:var(--mono);font-weight:600;margin:0 0 10px;border-bottom:1px solid var(--rule-2);padding-bottom:6px;
}
.field{margin-bottom:11px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:3px;}
.field .hint{font-size:11px;color:var(--ink-3);margin-top:2px;}
.field input[type=text],.field input[type=date],.field input[type=number],.field select,.field textarea{
  width:100%;padding:7px 9px;border:1px solid var(--rule);border-radius:var(--radius);
  background:#fff;font-size:12.8px;
}
.field textarea{min-height:56px;resize:vertical;line-height:1.4;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--wine-2);box-shadow:0 0 0 3px var(--wine-bg);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.ramo-list{display:flex;flex-direction:column;gap:8px;}
.ramo-opt{
  border:1px solid var(--rule);border-radius:var(--radius);padding:9px 11px;cursor:pointer;background:#fff;
}
.ramo-opt:hover{border-color:var(--brass-2);}
.ramo-opt.sel{border-color:var(--wine);background:var(--wine-bg);}
.ramo-opt .r-top{display:flex;gap:8px;align-items:flex-start;}
.ramo-opt input{margin-top:3px;}
.ramo-opt .r-label{font-size:12.7px;font-weight:600;line-height:1.35;}
.ramo-opt .r-docs{font-size:11px;color:var(--ink-3);margin:4px 0 0 22px;font-family:var(--mono);}

.docs-check{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.doc-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;border:1px dashed var(--rule);border-radius:var(--radius);background:#fff;}
.doc-row .tag{
  font-family:var(--mono);font-size:10.5px;background:var(--brass-bg);color:var(--brass);
  padding:1px 6px;border-radius:10px;font-weight:700;flex:0 0 auto;
}
.doc-row.done{border-style:solid;border-color:var(--ok);background:var(--ok-bg);}
.doc-row .name{flex:1;}
.doc-row button{
  font-size:10.5px;border:1px solid var(--rule);background:#fff;border-radius:12px;
  padding:2px 9px;cursor:pointer;font-weight:600;color:var(--ink-2);
}
.doc-row.done button{color:var(--wine);border-color:var(--wine-2);}

.ref-note{margin-top:14px;font-size:11px;color:var(--ink-3);font-style:italic;border-left:2px solid var(--brass-2);padding-left:9px;}

/* ---------- document panel ---------- */
.dp-toolbar{
  position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;
  padding:10px 22px;background:var(--paper-bg);border-bottom:1px solid var(--paper-edge);
}
.dp-toolbar .spacer{flex:1;}
.tbtn{
  border:1px solid var(--ink-3);background:#fff;color:var(--ink-2);padding:6px 12px;
  border-radius:16px;font-size:12px;cursor:pointer;font-weight:600;display:flex;gap:6px;align-items:center;
}
.tbtn:hover{border-color:var(--wine);color:var(--wine);}
.tbtn.primary{background:var(--wine);border-color:var(--wine);color:#fff;}
.tbtn.primary:hover{background:var(--wine-2);}
.tbtn.on{background:var(--ink);border-color:var(--ink);color:#fff;}

.doc-wrap{padding:26px 34px 90px;display:flex;justify-content:center;}
.page{
  width:100%;max-width:840px;background:var(--paper);
  box-shadow:0 1px 2px rgba(28,36,56,.06),0 10px 30px rgba(28,36,56,.14);
  border:1px solid var(--paper-edge);position:relative;padding:64px 70px 72px;
  font-family:var(--serif);font-size:16.5px;line-height:1.5;color:#1a2032;
}
.page[contenteditable="true"]{outline:2px dashed var(--brass-2);outline-offset:8px;}
.page h1.doctitle{font-size:16px;font-weight:700;text-align:right;font-family:var(--sans);margin:0 0 30px;color:var(--ink-2);}
.page .addr-block{margin-bottom:26px;}
.page .addr-block .to{font-size:15px;line-height:1.5;color:var(--ink-3);font-family:var(--sans);}
.page p{margin:0 0 18px;text-align:justify;}
.page h2.sec{
  font-family:var(--sans);font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--wine);font-weight:700;margin:30px 0 14px;padding-bottom:7px;border-bottom:1px solid var(--rule-2);
}
.page h3.subsec{
  font-family:var(--serif);font-size:16.5px;font-weight:700;font-style:italic;
  color:#1a2032;margin:22px 0 12px;
}
.page .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-family:var(--sans);font-size:15px;line-height:1.5;margin-bottom:5px;}
.page .kv b{color:var(--ink-3);font-weight:600;}
.page .sign{margin-top:54px;text-align:center;}
.page .sign .line{border-top:1px solid var(--ink-3);width:280px;margin:0 auto 7px;}
.ph{color:var(--wine-2);background:var(--wine-bg);padding:0 5px;border-radius:2px;font-style:normal;font-family:var(--sans);font-size:14px;}

/* exhibit tabs */
.exhibit{display:block;margin:8px 0 22px;}
.exhibit-box{
  border:1.5px dashed var(--brass-2);border-radius:6px;background:var(--brass-bg);
  padding:14px;display:flex;align-items:center;gap:12px;font-family:var(--sans);
}
.exhibit-box .num{
  width:30px;height:30px;border-radius:50%;background:var(--brass);color:#fff;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--mono);
}
.exhibit-box .lbl{flex:1;font-size:12.5px;color:#5a4b28;}
.exhibit-box .lbl b{display:block;color:var(--ink);font-size:12.5px;}
.exhibit-box button{
  background:var(--ink);color:#fff;border:none;padding:6px 12px;border-radius:14px;
  font-size:11.5px;cursor:pointer;font-weight:600;
}
.exhibit-filled{border:1px solid var(--rule);border-radius:6px;overflow:hidden;background:#fff;}
.exhibit-filled .cap{
  display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ok-bg);font-family:var(--sans);font-size:11.5px;
}
.exhibit-filled .cap .num{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;font-family:var(--mono);}
.exhibit-filled .cap b{flex:1;color:var(--ink);}
.exhibit-filled .cap button{background:transparent;border:1px solid var(--rule);border-radius:12px;padding:2px 9px;font-size:10.5px;cursor:pointer;color:var(--ink-3);}
.exhibit-filled img{display:block;max-width:100%;max-height:420px;object-fit:contain;margin:0 auto;background:#f4f4f2;}

.empty-doc{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-3);text-align:center;padding:60px;}
.empty-doc .inner{max-width:340px;}
.empty-doc .glyph{font-family:var(--serif);font-size:44px;color:var(--brass-2);margin-bottom:10px;}
.empty-doc h3{font-family:var(--serif);font-size:19px;color:var(--ink);margin:0 0 8px;}
.empty-doc p{font-size:13px;line-height:1.6;}

.reqs-table{width:100%;font-family:var(--sans);font-size:14.5px;line-height:1.5;margin:8px 0 6px;border-collapse:collapse;}
.reqs-table td{padding:5px 0;}
.reqs-table td.v{text-align:right;font-family:var(--mono);}
.reqs-table tr.total td{border-top:1px solid var(--ink-3);font-weight:700;padding-top:8px;}

@media (max-width:1100px){
  .layout{grid-template-columns:1fr;grid-auto-rows:min-content;}
  .rail,.form-panel,.doc-panel{display:none;border:none;}
  .rail.mobile-show,.form-panel.mobile-show,.doc-panel.mobile-show{display:block;}
  .mobiletabs{display:flex;background:#fff;border-bottom:1px solid var(--rule);}
  .mobiletabs button{flex:1;border:none;background:transparent;padding:11px;font-size:12px;font-weight:700;color:var(--ink-3);border-bottom:3px solid transparent;}
  .mobiletabs button.active{color:var(--wine);border-color:var(--wine);}
  .doc-wrap{padding:16px;}
  .page{padding:30px 20px;}
}
@media (min-width:1101px){.mobiletabs{display:none;}}

@media print{
  html,body{height:auto !important;}
  .app{height:auto !important;display:block !important;}
  .topbar,.rail,.form-panel,.dp-toolbar,.mobiletabs{display:none !important;}
  .layout{display:block !important;height:auto !important;}
  .doc-panel{display:block !important;overflow:visible !important;height:auto !important;background:#fff !important;}
  .doc-wrap{padding:0 !important;display:block !important;}
  .page{box-shadow:none !important;border:none !important;max-width:100% !important;width:100% !important;outline:none !important;padding:12mm 15mm !important;}
  .exhibit-filled img{max-height:220mm;}
  .exhibit-box{border-color:#999;}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="seal">P</div>
    <div class="brand"><b>Gerador de Subsídios</b><span>Jurídico · Pitzi</span></div>
    <div class="spacer"></div>
    <div class="tipo-toggle" id="tipoToggle">
      <button data-action="set-tipo" data-tipo="procon">PROCON</button>
      <button data-action="set-tipo" data-tipo="judicial">Subsídio Judicial</button>
    </div>
    <button class="btn-ghost-top" data-action="novo-caso">+ Novo caso</button>
  </div>

  <div class="mobiletabs" id="mobileTabs">
    <button data-action="mobile-tab" data-tab="rail" class="active">Motivo</button>
    <button data-action="mobile-tab" data-tab="form">Dados</button>
    <button data-action="mobile-tab" data-tab="doc">Documento</button>
  </div>

  <div class="layout">
    <div class="rail mobile-show" id="rail"></div>
    <div class="form-panel" id="formPanel"></div>
    <div class="doc-panel" id="docPanel"></div>
  </div>

</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
/* =========================================================================
   GERADOR DE SUBSÍDIOS — motor + dados
   ========================================================================= */

const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function esc(s){
  return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function V(val, ph){
  const s = (val===undefined||val===null?'':String(val)).trim();
  return s ? esc(s) : `<span class="ph">${esc(ph)}</span>`;
}
function D(val, ph){
  if(!val) return `<span class="ph">${esc(ph||'data')}</span>`;
  const [y,m,d] = val.split('-').map(Number);
  if(!y||!m||!d) return esc(val);
  return `${String(d).padStart(2,'0')} de ${MESES[m-1]} de ${y}`;
}
function todayLong(){
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function slot(id){ return `<div class="exhibit" data-slot="${id}"></div>`; }

/* Shared "abertura dos FATOS" — comum a quase todos os modelos */
function aberturaFatos(v){
  return `<p>A parte ${V(v.tratamento,'autora/consumidora')} adquiriu da PITZI plano de proteção para o aparelho modelo ${V(v.modeloAparelho,'modelo do aparelho')}, IMEI: ${V(v.imei,'nº do IMEI')}, n${'ª'} ${V(v.source,'loja/canal de venda')}, em ${D(v.dataAquisicao,'data de aquisição')}.</p>`;
}

const FECHAMENTO_BOAFE = `<p>Nesse sentido, entende a PITZI ter agido com clareza e boa-fé objetiva desde o início na resolução do caso, não havendo que se falar em danos materiais ou morais em desfavor da parte reclamante.</p>`;

const SOBRE_FORNECEDORA = (v) => `<p>A fornecedora PITZI é uma empresa especializada em recondicionamento, reparação, compra, venda e comercialização de aparelhos celulares, smartphones e tablets. Com atuação há mais de 13 anos na estruturação de produtos e serviços relacionados à excelência operacional de programas de seguros, representa as principais seguradoras do país, entre elas ${V(v.seguradoras,'GAZIN, GENERALI e MAPFRE')}.</p>`;

/* =========================================================================
   MOTIVOS (18) — cada um com: id, grupo, numero, titulo, quandoUsar,
   alegacaoDefault, camposExtras[], baseCasos, ramos[{id,label,docs[],texto(v)}]
   ========================================================================= */
const MOTIVOS = [];

/* ---- helper to push categories ---- */
function addMotivo(m){ MOTIVOS.push(m); }

/* ============================= GRUPO 1: CONTRATAÇÃO E VENDAS ============================= */

addMotivo({
  id:'nao_reconhece', numero:'01', grupo:'Contratação e Vendas',
  titulo:'Não reconhece a contratação/proteção',
  quandoUsar:'Consumidor alega desconhecer integralmente a contratação da proteção ou Garantia Estendida, pedindo estorno e indenização por danos morais.',
  alegacaoDefault:'A parte sustenta, em síntese, desconhecer a contratação da proteção objeto da lide, alegando ausência de consentimento livre e informado, bem como postula a restituição de valores e a indenização por danos morais.',
  baseCasos:'Sueellen Louise Severo · Leandro da Conceição de Jesus · Jonatas Oliveira dos Santos · Sonia Gracia Pucci Medina · Glória Correia de Almeida Lemos · Carlos Alberto Oliveira Santos',
  camposExtras:[
    {key:'canal', label:'Canal de venda', type:'select', options:['Loja física (varejo)','Amazon GE (marketplace)','Mercado Livre'], default:'Amazon GE (marketplace)'},
    {key:'bemSegurado', label:'Bem segurado (como individualizado no bilhete)', type:'text', ph:'ex.: Ventilador, Impressoras, Acessórios Eletrônicos'},
    {key:'valorPremio', label:'Valor do prêmio (R$)', type:'text', ph:'ex.: 21,00'},
    {key:'lmi', label:'Limite Máximo de Indenização — LMI (R$)', type:'text'},
    {key:'dataAdesao', label:'Data de adesão/emissão do bilhete', type:'date'},
    {key:'vigenciaIni', label:'Início da cobertura', type:'date'},
    {key:'vigenciaFim', label:'Fim da cobertura', type:'date'},
  ],
  ramos:[
    { id:'loja_fisica', label:'Loja física — comprovante emitido no ato + cláusula de cancelamento + e-mail de acesso',
      docs:[{id:'d1',label:'Cláusula de cancelamento do bilhete (ex.: item "Cancelamento")'},{id:'d2',label:'E-mail de acesso à área logada (customer.io)'}],
      texto:(v)=>`
        <p>Insta salientar que a fornecedora PITZI é uma empresa especializada em recondicionamento, reparação e proteção de aparelhos celulares, smartphones e tablets, com atuação há mais de 13 anos na estruturação de produtos e serviços relacionados à excelência operacional de programas de seguros em parceria com seguradoras, oferecendo, na plataforma do lojista, planos de proteção para aparelhos celulares.</p>
        <p>Para este modelo de parceria, os serviços de comercialização do aparelho, os valores relacionados ao seu financiamento e as condições do plano de dados e de telefonia móvel são de responsabilidade e autonomia do lojista/operadora de telefonia, não possuindo a PITZI responsabilidade objetiva ou subjetiva quanto aos valores em aberto da compra do aparelho ou do plano de telefonia contratado. Já a tutela da PITZI está limitada aos valores do plano de proteção, à regulação de sinistros, reparos, substituição/trocas e à logística dos aparelhos, quando acionada pela parte ${v.tratamento}.</p>
        <p>Posto isto, a parte ${v.tratamento} adquiriu da PITZI plano de proteção para o aparelho modelo ${V(v.modeloAparelho,'modelo do aparelho')}, IMEI ${V(v.imei,'nº do IMEI')}, na loja ${V(v.source,'nome da loja')}, em ${D(v.dataAquisicao,'data de aquisição')}.</p>
        <p>A parte ${v.tratamento} recebeu, no ato da contratação, o documento comprobatório de aquisição do plano, emitido na mesma data, restando comprovadas sua anuência e ciência acerca da contratação e das condições contratuais — em destaque, a cláusula de cancelamento, que de forma clara elucida que a contratação do plano é opcional, sendo possível sua desistência a qualquer tempo, em total alinho ao art. 49, caput, do Código de Defesa do Consumidor:</p>
        <p style="font-style:italic">"Art. 49. O consumidor pode desistir do contrato, no prazo de 7 dias a contar de sua assinatura ou do ato de recebimento do produto ou serviço, sempre que a contratação de fornecimento de produtos e serviços ocorrer fora do estabelecimento comercial, especialmente por telefone ou a domicílio."</p>
        ${slot('d1')}
        <p>Por conseguinte, no dia da aquisição do plano, foi enviada pela PITZI uma mensagem para o e-mail cadastrado pela parte ${v.tratamento}, disponibilizando um link de acesso à área logada, onde constam o contrato e as condições do plano adquirido, bem como os canais de atendimento para dúvida, cancelamento ou auxílio.</p>
        ${slot('d2')}
        <p>Insta salientar ainda que, até a presente data, não há qualquer registro de contato pela parte ${v.tratamento} aos canais de atendimento amplamente divulgados no bilhete e no e-mail, solicitando o cancelamento, reclamação ou auxílio para o plano — solicitação que a fornecedora só tomou conhecimento por meio da presente reclamação, período este em que esteve garantida a proteção à parte ${v.tratamento}, inclusive com a possibilidade de abertura de atendimento, configurando, portanto, a contraprestação devida em consonância ao art. 757 do Código Civil.</p>
        <p>Dito isso, a PITZI entende que resta comprovada a anuência e a ciência da parte ${v.tratamento} acerca da contratação do plano. Ainda assim, a fornecedora compreende a insatisfação manifestada e, por liberalidade, efetuou o cancelamento da proteção, oferecendo o ressarcimento por meio de depósito na quantia de R$ ${V(v.valorPremio,'valor do prêmio')}, mediante fornecimento dos dados bancários de titularidade da parte ${v.tratamento}: nome completo, CPF, banco, agência e conta corrente.</p>` },
    { id:'amazon', label:'Amazon GE — fluxo de checkbox no checkout (contratação eletrônica regular)',
      docs:[
        {id:'d1',label:'Bilhete de seguro (cobertura, prêmio, vigência, dados da parte segurada)'},
        {id:'d2',label:'Print do fluxo de checkout — tela de seleção da oferta (checkbox)'},
        {id:'d3',label:'Print do fluxo de checkout — finalização do carrinho'},
        {id:'d4',label:'Cláusula do bilhete: contratação opcional, sem vínculo a promoções'},
      ],
      texto:(v)=>`
        <h3 class="subsec">Da Garantia Estendida e do produto adquirido</h3>
        <p>A Garantia Estendida consiste em um seguro destinado a ampliar, após o término da garantia original do fabricante ou fornecedor, a cobertura de defeitos funcionais do bem segurado, observadas as condições gerais e os limites previstos no bilhete.</p>
        <p>No caso em tela, o bilhete de seguro registra expressamente a contratação de cobertura para "Defeito de Fábrica (Garantia Estendida)", com limite máximo de indenização de R$ ${V(v.lmi,'valor do LMI')} e prêmio total de R$ ${V(v.valorPremio,'valor do prêmio')}.</p>
        ${slot('d1')}
        <p>O bem segurado foi individualizado no contrato como "${V(v.bemSegurado,'descrição do bem')}", o que demonstra que a proteção não foi lançada de forma genérica ou desvinculada de compra específica, mas atrelada a um produto específico adquirido no ambiente logado do e-commerce da Amazon.</p>
        <p>O documento contratual também indica o nome da parte ${v.tratamento}, CPF, e-mail, telefone, endereço, data de adesão e emissão em ${D(v.dataAdesao,'data de adesão')}, com início da cobertura em ${D(v.vigenciaIni,'início')}, encerrando-se em ${D(v.vigenciaFim,'fim')}. O documento fica disponível na área do cliente e uma cópia é enviada ao e-mail cadastrado no login.</p>

        <h3 class="subsec">Da contratação na Amazon</h3>
        <p>A PITZI atua em parceria com a Amazon Brasil, disponibilizando em sua plataforma planos de Garantia Estendida para produtos eletroeletrônicos, cuja adesão é facultativa e exige manifestação positiva do consumidor no fluxo de compra, mediante seleção da oferta na tela e posterior conclusão do pedido, conforme jornada de aquisição reproduzida a seguir a título meramente exemplificativo do fluxo padrão do sistema, sem correspondência necessária com a tela exata exibida na data e no produto específico da operação em exame.</p>
        ${slot('d2')}
        <p>Nesse sentido, a contratação ocorre no processo de compra no e-commerce, em etapa própria e anterior à conclusão do pedido, mediante seleção da oferta pelo consumidor por meio de checkbox, seguida da finalização do carrinho, conforme telas ilustrativas do funcionamento padrão da plataforma:</p>
        ${slot('d3')}
        <p>Trata-se de fluxo que depende de manifestação positiva do titular da compra para a inclusão da proteção no pedido. Não se trata de produto obrigatório, automático ou imposto como condição para aquisição do bem, mas de oferta acessória vinculada a bens elegíveis, cuja contratação isolada, desvinculada de qualquer compra, é incompatível com a própria configuração do sistema da parceira.</p>
        <p>As próprias condições contratuais do bilhete juntado aos autos reforçam esse ponto ao estabelecer, de forma expressa, que a contratação do seguro é opcional e não está vinculada a qualquer promoção de produtos da loja, sendo proibido condicionar desconto no preço do bem à aquisição do seguro:</p>
        ${slot('d4')}
        <p>Assim, à vista da documentação existente, mostra-se mais plausível concluir que a Garantia Estendida foi contratada no momento da compra do bem, no curso regular da jornada eletrônica do pedido, tendo a parte ${v.tratamento}, posteriormente, deixado de se recordar da adesão. Ainda em caráter subsidiário, caso não tenha sido ela quem materialmente concluiu a operação, subsiste a possibilidade de que a aquisição tenha sido realizada por pessoa de sua confiança, inclusive familiar, com acesso consentido e autorizado aos seus dados e credenciais no ambiente de compra — circunstância que, por evidente, não caracteriza contratação viciada nem autoriza imputar à fornecedora qualquer irregularidade, uso indevido de dados ou vício de consentimento.</p>

        <h3 class="subsec">Da regularidade da contratação</h3>
        <p>No presente caso, não foi identificada qualquer irregularidade na contratação. Ao contrário, os documentos indicam a emissão regular do bilhete, a individualização completa da parte segurada, a indicação precisa do produto adquirido, o prêmio cobrado, a vigência, a cobertura contratada e os canais de atendimento para dúvidas, cancelamento e informações gerais.</p>
        <p>A mera alegação unilateral de desconhecimento, por si só, não é apta a invalidar a contratação eletrônica impugnada. Para tanto, seria indispensável a demonstração concreta de circunstância excepcional, como fraude, uso indevido de dados pessoais, acesso irregular à conta, falha sistêmica da plataforma ou vício específico de consentimento — o que não se verifica nos autos. Ao contrário, a contratação em exame mostra-se compatível com operação regularmente realizada em ambiente eletrônico autenticado, mediante credenciais pessoais, no contexto de compra em que a adesão à garantia estendida depende da seleção expressa da oferta e da conclusão do pedido pela própria titular.</p>
        <p>Também não há, nos autos, demonstração de qualquer proposta de solução extrajudicial específica e útil perante a PITZI relativa a este contrato. Eventual menção a reclamações genéricas no consumidor.gov.br sobre outros produtos não substitui a comprovação de protocolo direcionado especificamente à PITZI para esclarecimento, cancelamento ou resolução administrativa da Garantia Estendida discutida nesta lide. Tal circunstância revela judicialização prematura da controvérsia e impede, inclusive, a verificação administrativa de eventual divergência pontual.</p>

        <h3 class="subsec">Do direito de arrependimento e do cancelamento contratual</h3>
        <p>Ainda que a contratação tenha ocorrido de forma regular, livre de vícios e com consentimento da titular, o próprio contrato assegura mecanismos de desistência e cancelamento, inclusive diretamente no menu de pedidos da área logada.</p>
        <p>As condições contratuais preveem o direito de arrependimento em até 7 (sete) dias corridos, contados da emissão do contrato, com devolução integral do valor pago, desde que a desistência seja comunicada à PITZI por um de seus canais de atendimento. Igualmente, estabelecem que o titular poderá solicitar o cancelamento a qualquer momento, mediante comunicação à PITZI, com retenção proporcional apenas se o pedido ocorrer após o prazo inicial de 7 dias. O bilhete informa com clareza os canais disponíveis para cancelamento — central telefônica, WhatsApp, e-mail e chat —, podendo o pedido também ser cancelado diretamente no site da parceira Amazon.</p>

        <h3 class="subsec">Da boa-fé da ré e da oferta de solução consensual</h3>
        <p>Sem que isso importe reconhecimento de falha na prestação do serviço, de irregularidade na contratação ou de procedência da narrativa, a PITZI, em observância aos princípios da boa-fé objetiva, da cooperação processual e da primazia da solução consensual dos conflitos, manifesta, desde já, sua concordância com o cancelamento do contrato n.º ${V(v.cadastro,'nº do contrato')} e com o estorno integral do prêmio pago pela parte ${v.tratamento}, no valor de R$ ${V(v.valorPremio,'valor do prêmio')}.</p>
        <p>A providência é ofertada por mera liberalidade conciliatória, com o objetivo de pôr fim à controvérsia de forma célere e proporcional, notadamente diante do reduzido valor envolvido, sem prejuízo da manutenção da tese principal de plena validade da contratação. Por conseguinte, eventual discussão remanescente deve ser limitada, quando muito, à formalização do cancelamento e à devolução simples do prêmio, afastando-se qualquer pretensão de repetição em dobro ou de condenação por dano moral, ausentes os pressupostos legais para tanto.</p>

        <h3 class="subsec">Da improcedência dos danos morais e da repetição em dobro</h3>
        <p>A situação descrita nos autos não revela prática abusiva apta a ensejar dano moral indenizável, sobretudo porque o contrato apresenta elementos objetivos de regularidade, a contratação é compatível com a jornada eletrônica da Amazon e inexiste prova de resistência indevida da PITZI a pedido administrativo específico da parte ${v.tratamento}.</p>
        <p>Do mesmo modo, não há espaço para repetição do indébito em dobro. Além de inexistir cobrança manifestamente indevida, a própria fornecedora oferece solução material suficiente ao caso com o cancelamento e o estorno simples do prêmio, sem que se possa extrair má-fé ou conduta contrária à boa-fé objetiva.</p>` },
    { id:'meli', label:'Mercado Livre — contratação vinculada à compra no marketplace',
      docs:[{id:'d1',label:'Comprovante de contratação anexado pela parte'}],
      texto:(v)=>`
        <p>A PITZI atua/atuava em parceria com o Mercado Livre, oferecendo em sua plataforma planos de proteção para aparelhos celulares. Para este modelo de parceria, os serviços de contratação, acionamento (abertura de SR), cancelamento e estorno de valores são processados diretamente com o parceiro Mercado Livre, estando a tutela da PITZI limitada a sanar dúvidas quanto à proteção e à regulação de sinistros, reparos, substituição/trocas e logística, quando acionada pelo próprio parceiro.</p>
        <p>A parte ${v.tratamento} anexou em sua reclamação o documento comprobatório de aquisição do plano, emitido na mesma data de contratação, restando comprovada sua anuência e ciência acerca da contratação e das condições contratuais, em destaque a individualização do bem segurado (${V(v.bemSegurado,'descrição do bem')}), o prêmio de R$ ${V(v.valorPremio,'valor')} e o Limite Máximo de Indenização de R$ ${V(v.lmi,'valor do LMI')}.</p>
        ${slot('d1')}

    { id:'ja_cancelado', label:'Já cancelado a pedido do consumidor — estorno já efetuado ou em oferta',

        ${slot('d2')}
        <p>Dito isso, entende a PITZI já ter sido cumprida integralmente a solicitação da parte ${v.tratamento}, não havendo que se falar em desconhecimento da contratação ou em qualquer dano material ou moral.</p>` },

      texto:(v)=>`
        <p>Insta salientar que a fornecedora PITZI é uma empresa especializada em recondicionamento, reparação e proteção de aparelhos celulares, smartphones e tablets. Com atuação há mais de 13 anos na estruturação de produtos e serviços relacionados à excelência operacional de programas de seguros em parcerias com seguradoras, oferece na plataforma do lojista planos de proteção para aparelhos celulares e garantia estendida para eletroeletrônicos.</p>
        <p>Para este modelo de parceria, os serviços de comercialização do produto, da proteção, bem como valores inerentes ao financiamento do dispositivo, condições do plano e produtos, são de responsabilidade e de autonomia dos lojistas parceiros. De igual modo, cabe ao lojista assegurar o aceite claro e voluntário do consumidor para a contratação do plano, em consonância aos princípios norteadores do Código de Defesa do Consumidor: a loja parceira poderá ofertar ou não o produto, a critério comercial desta, sempre respeitando a escolha consciente e informada do consumidor, em estrita observância aos princípios da boa-fé objetiva, da transparência e da informação adequada previstos no CDC, sendo vedada qualquer forma de venda casada ou prática comercial abusiva.</p>
        <p>Já a tutela da PITZI está limitada aos valores do plano de proteção, à regulação de sinistros, reparos, substituição/trocas e à logística dos aparelhos para execução dos serviços, quando acionada pela parte ${v.tratamento}. A fornecedora reforça, ainda, que a comercialização da proteção é um serviço opcional e independente da aquisição de aparelhos celulares — a loja, como parceira comercial da PITZI, não possui autorização legal e/ou contratual para embutir, coagir, ludibriar ou impor os seus serviços para contratação dos consumidores, prática esta veementemente repudiada e que não coaduna com a atuação da fornecedora.</p>
        <p>Razão pela qual todos os vendedores passam por rigoroso treinamento, no qual uma das informações reforçadas é que é permanentemente proibido condicionar desconto no preço do bem à aquisição do seguro e/ou vincular a aquisição do bem à contratação compulsória de qualquer tipo de seguro, ofertar bens em condições mais vantajosas para quem contrata o plano, ou deixar de informar sobre a contratação de todos os itens adquiridos.</p>
        <p>Posto isto, a parte ${v.tratamento} adquiriu da PITZI plano de proteção para o aparelho modelo ${V(v.modeloAparelho,'modelo do aparelho')}, IMEI ${V(v.imei,'nº do IMEI')}, na ${V(v.source,'loja')}, em ${D(v.dataAquisicao,'data de aquisição')}.</p>
        <p>A parte ${v.tratamento} recebeu o documento comprobatório de aquisição do plano, emitido na mesma data da contratação, restando comprovada sua anuência e ciência acerca da contratação e das condições contratuais.</p>
        ${slot('d1')}
        <p>Frisa-se destacar que, no contrato recebido, a cláusula de "Cancelamento" elucida de forma clara e objetiva que a contratação do plano é opcional, sendo possível sua desistência a qualquer tempo, em total alinho ao art. 49, caput, do Código de Defesa do Consumidor:</p>
        <p style="font-style:italic">"Art. 49. O consumidor pode desistir do contrato, no prazo de 7 dias a contar de sua assinatura ou do ato de recebimento do produto ou serviço, sempre que a contratação de fornecimento de produtos e serviços ocorrer fora do estabelecimento comercial, especialmente por telefone ou a domicílio."</p>
        ${slot('d2')}
        <p>Insta salientar ainda que, até a presente data, não há qualquer registro de contato pela parte ${v.tratamento} aos canais de atendimento amplamente divulgados no bilhete, e-mails ou mídias sociais, solicitando o cancelamento, reclamação ou auxílio para o plano — solicitação essa que a fornecedora só tomou conhecimento por meio da presente reclamação${v.numDias?`, tão somente após transcorridos ${V(v.numDias,'nº')} dias da aquisição do plano`:''}, período este em que esteve garantida a proteção à parte ${v.tratamento}, inclusive com a possibilidade de abertura de atendimento, configurando, portanto, a contraprestação devida.</p>
        <p>Dito isto, a fornecedora entende que houve o cumprimento da oferta contratual; contudo, diante da insatisfação da parte ${v.tratamento}, realizou o cancelamento da proteção.</p>
        ${slot('d3')}
        <p>Apesar da insatisfação manifestada, a PITZI não se opõe a proceder com o estorno do valor de R$ ${V(v.valorPremio,'valor do prêmio')}. Esse estorno será realizado como crédito na fatura, abrangendo os valores das mensalidades vencidas e as que ainda irão vencer, podendo ser feito em 2 (duas) ou 3 (três) faturas seguintes à solicitação, conforme a operadora do cartão. A parte ${v.tratamento}, naquele momento, terá a opção de solicitar a antecipação das parcelas programadas — que continuarão a ser debitadas — e pagá-las de uma só vez com o valor disponibilizado.</p>
        <p>Por fim, a fornecedora entende que houve o cumprimento da oferta contratual e o atendimento à requisição da parte ${v.tratamento}, não prosperando a alegação de venda casada e/ou qualquer dificuldade para o cancelamento do plano.</p>` },
    { id:'contrato_anexado', label:'Consumidor anexou o próprio bilhete/comprovante na reclamação',
      docs:[{id:'d1',label:'Comprovante de contratação (anexado pela própria parte)'}],
      texto:(v)=>`
        <p>A parte ${v.tratamento} anexou em sua própria reclamação (página do documento correspondente) o documento comprobatório de aquisição do plano, restando comprovada sua anuência e ciência acerca da contratação.</p>
        ${slot('d1')}
        <p>Nesse sentido, entende a PITZI que a alegação de venda casada é infundada e não encontra guarida na própria documentação trazida pela parte ${v.tratamento}. Todos os vendedores parceiros passam por rigoroso treinamento, no qual é reforçada a proibição de condicionar desconto no preço do bem à aquisição do seguro e de vincular a aquisição do bem à contratação compulsória de qualquer proteção, ofertar bens em condições mais vantajosas para quem contrata o plano, ou deixar de informar sobre a contratação de todos os itens adquiridos.</p>
        <p>Entende ainda ter desde o início demonstrado boa-fé na resolução do problema, não havendo que se falar em danos materiais e morais.</p>` },
    { id:'uso_da_protecao', label:'Consumidor fez uso da proteção durante a vigência (sinistro aberto e atendido)',
      docs:[{id:'d1',label:'Registro de abertura e atendimento do sinistro'},{id:'d2',label:'Comprovante de cobrança do prêmio sem contestação bancária'}],
      texto:(v)=>`
        <p>Em data anterior à presente reclamação, a parte ${v.tratamento} fez uso do plano de proteção, tendo a PITZI procedido com a regulação dos documentos e, após aprovação, com a indenização na forma de reposição do bem segurado, remetendo pelos Correios um aparelho de reposição.</p>
        ${slot('d1')}
        <p>A PITZI entende, portanto, que resta comprovada a anuência e a ciência da parte ${v.tratamento} acerca da contratação do plano, na medida em que fez uso efetivo do serviço durante a vigência da proteção.</p>
        <p>Vale ressaltar ainda que o pagamento do prêmio na quantia total de R$ ${V(v.valorPremio,'valor')} foi efetuado sem qualquer contestação bancária ou da parte ${v.tratamento}.</p>
        ${slot('d2')}
        <p>Durante todo o período de vigência do plano esteve garantida à parte ${v.tratamento} a possibilidade de abertura de atendimento, configurando-se, portanto, a contraprestação devida em total alinho ao art. 757 do Código Civil ("Pelo contrato de seguro, o segurador se obriga, mediante o pagamento do prêmio, a garantir interesse legítimo do segurado, relativo a pessoa ou a coisa, contra riscos predeterminados"). Dito isso, a PITZI entende que resta comprovada a anuência e a ciência da parte ${v.tratamento} acerca da contratação do plano, não havendo que se falar em danos materiais ou morais.</p>` },
    { id:'sem_indicios', label:'Sem indícios que contestem a alegação — oferta de estorno por liberalidade',
      docs:[],
      texto:(v)=>`

        <p>Salienta-se que o depósito será efetuado a título de devolução da quantia paga pelo cartão, cobrindo os valores das mensalidades vencidas e vincendas, devendo a parte ${v.tratamento}, a seu critério, solicitar a antecipação das parcelas geradas e quitá-las de uma só vez. Entende ainda a fornecedora ter demonstrado, desde o início, boa-fé na resolução do problema, não havendo que se falar em danos morais.</p>` },
  ]
});

addMotivo({
  id:'garantia_vigencia', numero:'03', grupo:'Contratação e Vendas',
  titulo:'Vigência: garantia de fábrica x garantia estendida',
  quandoUsar:'Consumidor questiona por que a vigência da Garantia Estendida só começa após o fim da garantia do fabricante, ou alega que o prazo do bilhete está incorreto.',
  alegacaoDefault:'A parte alega que a vigência informada no bilhete está incorreta/atrasada, pois deveria contar a partir da compra, e não do fim da garantia de fábrica.',
  baseCasos:'Magali Império Bakar Scarmato · Luis Fernando Matricardi Rodrigues · Sandra Candal',
  camposExtras:[
    {key:'fabricante', label:'Fabricante do produto', type:'text', ph:'ex.: Philips Walita, WAP'},
    {key:'garantiaFabricanteAnos', label:'Prazo de garantia do fabricante', type:'text', ph:'ex.: 2 (dois) anos'},
    {key:'dataEmissaoBilhete', label:'Data de emissão do bilhete', type:'date'},
    {key:'vigenciaIni', label:'Início da vigência da Garantia Estendida', type:'date'},
    {key:'vigenciaFim', label:'Fim da vigência da Garantia Estendida', type:'date'},
    {key:'protocoloContato', label:'Protocolo de atendimento (se houve retificação)', type:'text'},
  ],
  ramos:[
    { id:'retificado', label:'Consumidor entrou em contato — vigência já retificada junto à seguradora',
      docs:[{id:'d1',label:'Bilhete com a vigência'},{id:'d2',label:'Nota fiscal + Termo de Garantia do fabricante'},{id:'d3',label:'Processo SUSEP do produto (consulta pública)'}],
      texto:(v)=>`
        <p>O bilhete de proteção apresentado pela parte ${v.tratamento} estabelece a vigência da cobertura específica para o período de ${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}, conforme claramente disposto no documento. Esta delimitação temporal é essencial ao contrato de proteção, que define o período de cobertura da Garantia Estendida.</p>
        ${slot('d1')}
        <p>A distinção entre a data de emissão da proteção (${D(v.dataEmissaoBilhete,'emissão')}) e a vigência da cobertura (${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}) encontra respaldo na natureza específica do produto contratado. A Garantia Estendida tem por finalidade precípua complementar a garantia legal e contratual do fabricante, iniciando sua eficácia após o término destas. O documento especifica com clareza os períodos de vigência, não havendo margem para interpretações diversas, sendo que a parametrização inicial considerou o prazo usual de garantia contratual do fabricante — quando, no caso concreto, o produto ${V(v.fabricante,'fabricante')} possui garantia contratual de ${V(v.garantiaFabricanteAnos,'prazo')}, contada da entrega, conforme nota fiscal e certificado de garantia do fabricante.</p>
        ${slot('d2')}
        <p>Cumpre esclarecer que, na verdade, houve ausência de informação do vendedor para a parte ${v.tratamento}, esclarecendo as garantias existentes: a garantia legal, de 90 (noventa) dias, usualmente adotada por vendedores terceiros (intermediários, não fabricantes do produto); em conjunto, não cumulativa, a garantia contratual do fabricante (usualmente não menor que um ano, podendo ter prazo maior — como no caso concreto); e, por último, a Garantia Estendida contratada, que inicia sua vigência justamente ao final da garantia do vendedor e do fabricante, estendendo, como o próprio nome traduz, a proteção do produto.</p>
        <p>Cumpre esclarecer, ainda, que o protocolo de atendimento adotado pela fornecedora prevê, como medida de eficiência e economicidade para o consumidor, a verificação inicial da vigência da garantia de fábrica. Quando o produto ainda se encontra sob esta cobertura, é orientado o acionamento direto junto ao fabricante, sem custos adicionais para a parte ${v.tratamento}; em prazos diversos, são solicitados a nota fiscal e o Termo de Garantia para ajuste em sistema, iniciando-se rigorosamente ao findar o prazo da garantia do fabricante. Foi exatamente este o procedimento adotado no presente caso: em contato realizado pela parte ${v.tratamento} (protocolo n.º ${V(v.protocoloContato,'nº do protocolo')}), a fornecedora prontamente solicitou o comprovante da garantia do fabricante e a nota fiscal do produto, documentos apresentados pela parte, tendo sido aberto chamado interno para retificação da vigência do contrato junto à seguradora.</p>
        <p>Esta prática não configura recusa de cobertura, mas orientação técnica adequada, posto que a garantia de fábrica possui escopo específico e não implica custos adicionais ao segurado, cobrindo defeitos funcionais decorrentes de falhas no processo de fabricação ou vícios intrínsecos do produto — não abrangendo, portanto, danos decorrentes de mau uso, desgaste natural, acidentes ou inobservância das recomendações de manutenção especificadas pelo fabricante.</p>
        <p>De igual modo, o contrato de proteção em análise foi estruturado em consonância com as diretrizes estabelecidas pela Superintendência de Seguros Privados (SUSEP), disponível para consulta pública na íntegra no sítio eletrônico da autarquia, o qual também estabelece com clareza os riscos cobertos, excluídos e as condições de acionamento da Garantia Estendida, principalmente sobre a responsabilidade do fabricante nesses casos.</p>
        ${slot('d3')}
        <p>Posto que ausente qualquer ato ilícito praticado pela seguradora e sua representante, bem como nexo causal entre sua conduta e os alegados danos, a mera existência de defeito no produto adquirido, quando ainda sob garantia de fábrica, não configura responsabilidade da seguradora ou de seus representantes. A aplicação dos princípios da boa-fé objetiva e da função social do contrato não pode resultar em responsabilização por fatos não imputáveis à conduta da requerida, sob pena de violação aos princípios basilares do direito civil e securitário.</p>
        <p>Dito isso, a fornecedora entende que resta comprovada a anuência e a ciência da parte ${v.tratamento} acerca da contratação do plano, das Condições Gerais e da cobertura contratualmente prevista, tendo a fornecedora providenciado a retificação do período de cobertura em atendimento ao pleito. De igual modo, a parte ${v.tratamento} não demonstrou a negativa injustificada da fabricante ${V(v.fabricante,'fabricante')}, muito menos a incluiu no polo passivo da presente demanda.</p>` },
    { id:'sem_contato', label:'Sem contato prévio do consumidor — vigência do bilhete permanece válida',
      docs:[{id:'d1',label:'Bilhete com a vigência'},{id:'d2',label:'Processo SUSEP do produto (consulta pública)'}],
      texto:(v)=>`
        <p>O bilhete de seguro apresentado pela parte ${v.tratamento} estabelece vigência da cobertura para o período de ${D(v.vigenciaIni,'início')} a ${D(v.vigenciaFim,'fim')}, o que não configura cláusula abusiva, mas elemento essencial do contrato que define o período de cobertura da Garantia Estendida. A distinção entre a vigência da proteção e a vigência da cobertura encontra respaldo na natureza específica do produto contratado: a Garantia Estendida tem por finalidade complementar a garantia legal e contratual do fabricante ${V(v.fabricante,'fabricante')}, de ${V(v.garantiaFabricanteAnos,'prazo')}, iniciando sua eficácia apenas após o término desta.</p>
        ${slot('d1')}
        <p>O art. 47 do Código de Defesa do Consumidor estabelece que cláusulas contratuais ambíguas devem ser interpretadas favoravelmente ao consumidor. Contudo, no presente caso, não há ambiguidade na redação contratual: o documento especifica com clareza os períodos de vigência, não havendo margem para interpretações dúbias.</p>
        <p>Nesse sentido, não se identifica qualquer tentativa de acionamento da cobertura por parte da parte ${v.tratamento} junto aos canais de atendimento disponibilizados. O art. 373, inciso I, do Código de Processo Civil estabelece que incumbe ao autor o ônus da prova quanto ao fato constitutivo de seu direito; no presente caso, a parte ${v.tratamento} não apresentou evidências de tentativa de acionamento da cobertura junto à seguradora ou sua representante, limitando-se a alegar a negativa do fabricante para atendimento sob garantia de fábrica, de responsabilidade exclusiva deste. A Súmula 330 do TJRJ consolida o entendimento de que os princípios facilitadores da defesa do consumidor em juízo, notadamente a inversão do ônus da prova, não exoneram a parte autora do ônus de produzir prova mínima do fato constitutivo do alegado direito.</p>
        <p>Cumpre esclarecer, ainda, que o protocolo de atendimento adotado pela fornecedora prevê, como medida de eficiência e economicidade para o consumidor, a verificação inicial da vigência da garantia de fábrica: quando o produto ainda se encontra sob esta cobertura, é orientado o acionamento direto junto ao fabricante, sem custos adicionais para o consumidor. Esta prática não configura recusa de cobertura, mas orientação técnica adequada, posto que a garantia de fábrica possui escopo mais amplo e não implica custos adicionais ao segurado — cobrindo exclusivamente defeitos funcionais decorrentes de falhas no processo de fabricação ou vícios intrínsecos do produto, e não danos decorrentes de mau uso, desgaste natural, acidentes ou inobservância das recomendações do fabricante. Eventual laudo técnico apresentado pela própria parte ${v.tratamento}, quando incompleto, não demonstra a razão da negativa da fabricante na cobertura do defeito, que, ao que tudo indica, decorreu do processo de fabricação.</p>
        <p>O contrato foi estruturado em consonância com as diretrizes da SUSEP, disponíveis para consulta pública, que estabelecem com clareza os riscos cobertos, excluídos e as condições de acionamento da Garantia Estendida.</p>
        ${slot('d2')}
        <p>Ausente qualquer ato ilícito da seguradora ou nexo causal com os alegados danos, a mera existência de defeito no produto ainda sob garantia de fábrica não configura responsabilidade da seguradora ou de suas representantes. A aplicação dos princípios da boa-fé objetiva e da função social do contrato não pode resultar em responsabilização por fatos não imputáveis à conduta da requerida, sob pena de violação aos princípios basilares do direito civil e securitário.</p>` },
  ]
});

      texto:(v)=>`

addMotivo({
  id:'sr_rejeitada_doc', numero:'08', grupo:'Sinistro e Atendimento (SR)',
  titulo:'SR rejeitada — documentação',
  quandoUsar:'Pedido de serviço/sinistro foi rejeitado por pendência documental: IMEI não bloqueado, BO incompleto ou conta iCloud/Mi Cloud ativa.',
  alegacaoDefault:'A parte alega ter sido injustamente impedida de utilizar a proteção contratada em razão da negativa de atendimento do sinistro.',
  baseCasos:'Edenice de Jesus Silva · Luis Henrique Muxfeldt Gutterres',
  camposExtras:[
    {key:'dataSinistro', label:'Data de abertura do sinistro', type:'date'},
    {key:'dataNotificacao', label:'Data da notificação sobre a pendência', type:'date'},
    {key:'dataConsultaAnatel', label:'Data da consulta ANATEL (IMEI sem bloqueio)', type:'date'},
  ],
  ramos:[
    { id:'imei', label:'IMEI não bloqueado (roubo/furto)',
      docs:[{id:'d1',label:'Cláusula do bilhete — documentação necessária para roubo/furto'},{id:'d2',label:'Print da consulta ANATEL sem restrição de uso'},{id:'d3',label:'E-mails/WhatsApp de notificação sobre a pendência'}],
      texto:(v)=>`
        <p>A fornecedora impugna, desde logo, a narrativa da reclamação que contrarie os documentos contratuais e os registros de atendimento. Os anexos demonstram que não houve recusa arbitrária, mas suspensão do fluxo de análise por pendência documental indispensável ao tipo de evento comunicado, nos exatos termos do contrato.</p>
        <p>O bilhete apresentado pela parte ${v.tratamento} é expresso ao dispor, na cláusula de documentação necessária para o aviso de sinistro, que, em caso de roubo ou furto, é imprescindível efetuar o bloqueio do IMEI do aparelho e anexar o boletim de ocorrência na íntegra dentro do processo.</p>
        ${slot('d1')}
        <p>Em ${D(v.dataSinistro,'data')}, a parte ${v.tratamento} abriu sinistro indicando ter sido vítima de roubo/furto, porém não apresentou o comprovante de bloqueio do IMEI. Consta dos registros internos e das comunicações enviadas que, em consulta realizada em ${D(v.dataConsultaAnatel,'data da consulta')}, o IMEI do aparelho permanecia sem restrição de uso, evidenciando a ausência do bloqueio exigido para o prosseguimento da regulação.</p>
        ${slot('d2')}
        <p>Em ${D(v.dataNotificacao,'data')}, a fornecedora encaminhou comunicação notificando a parte ${v.tratamento} acerca da necessidade de realizar o bloqueio do IMEI e/ou reenviar a documentação completa, a fim de dar seguimento ao pedido. Reiterou-se essa informação em contatos subsequentes, inclusive via e-mail e WhatsApp, com orientação clara sobre o procedimento e disponibilização de canal para envio dos documentos.</p>
        ${slot('d3')}
        <p>Após tentativas de regularização sem êxito, o pedido foi interrompido. A informação e o bloqueio do IMEI visam identificar o aparelho, impedir seu uso por terceiros não autorizados, coibir a comercialização irregular do dispositivo e resguardar dados sensíveis do consumidor — inclusive aplicativos bancários e carteiras digitais. A exigência não é aleatória nem abusiva: está conectada à própria dinâmica do sinistro de roubo ou furto e à necessidade de adoção, pela vítima, de providências mínimas de contenção do risco e de segurança do aparelho subtraído, em consonância com o art. 771 do Código Civil ("Sob pena de perder o direito à indenização, o segurado participará o sinistro ao segurador, logo que o saiba, e tomará as providências imediatas para minorar-lhe as consequências") e, atualmente, com o art. 66 da Lei n.º 15.040/2024, que impõe ao segurado o dever de tomar as providências necessárias e úteis para evitar ou minorar os efeitos do sinistro, sob pena de perda do direito à indenização em caso de descumprimento culposo (art. 66, § 2º).</p>
        <p>Portanto, a PITZI apenas observou o regulamento contratual aceito pela própria parte ${v.tratamento} no momento da adesão — não se trata de inovação posterior, nem de exigência oculta, mas de condição objetiva, escrita e diretamente relacionada ao evento coberto. A documentação anexa demonstra atuação ativa da fornecedora para viabilizar a regularização do acionamento, revelando boa-fé objetiva, transparência e esforço concreto de resolução, o que afasta qualquer alegação de desídia, surpresa contratual ou recusa infundada.</p>
        <p>Nesse sentido, a fornecedora entende que a negativa para o atendimento tinha previsão expressa no contrato, não havendo que se falar em qualquer prejuízo material ou moral à parte ${v.tratamento}. O plano de proteção permanece ativo, habilitado à abertura de novo pedido de serviço, desde que cumprida a exigência contratual de comprovação do bloqueio do IMEI.</p>` },
    { id:'bo_incompleto', label:'Boletim de Ocorrência incompleto ou ilegível',
      docs:[{id:'d1',label:'Cláusula do bilhete — documentação necessária'},{id:'d2',label:'BO incompleto/ilegível anexado ao pedido'},{id:'d3',label:'E-mails de notificação sobre a pendência'}],
      texto:(v)=>`
        <p>O bilhete apresentado pela parte ${v.tratamento} exige, para casos de roubo/furto, a apresentação do registro de ocorrência policial.</p>
        ${slot('d1')}
        <p>Em ${D(v.dataSinistro,'data')}, a parte ${v.tratamento} abriu sinistro indicando ter sido vítima de roubo/furto, porém não apresentou registro de ocorrência policial completo e legível.</p>
        ${slot('d2')}
        <p>Em ${D(v.dataNotificacao,'data')}, a fornecedora notificou a parte ${v.tratamento} sobre a necessidade de envio da documentação completa e legível para prosseguimento do pedido. Após três tentativas improcedentes de regularização, o pedido foi interrompido.</p>
        ${slot('d3')}
        <p>A negativa possui previsão expressa no contrato, não havendo que se falar em qualquer indenização por danos materiais ou morais — a proteção permanece ativa, podendo a parte ${v.tratamento} abrir novo sinistro desde que cumprida a exigência contratual.</p>` },
    { id:'icloud', label:'Conta iCloud/Mi Cloud ativa no aparelho (LGPD)',
      docs:[{id:'d1',label:'Print da tela do aparelho logado'}],
      texto:(v)=>`
        <p>A parte ${v.tratamento} abriu sinistro solicitando a reparação do aparelho. No momento da regulação, identificou-se que o aparelho estava com a conta iCloud/Mi Cloud ativa, ou seja, com a conta pessoal da parte logada.</p>
        ${slot('d1')}
        <p>De acordo com a Lei Geral de Proteção de Dados (LGPD), a PITZI, como representante da seguradora, não possui autorização para manipular um aparelho logado, visto não poder acessar os dados pessoais sensíveis do usuário. Por essa razão, foi informado à parte ${v.tratamento} que o aparelho deveria ter a conta desvinculada, concedendo-se prazo de 30 dias para o procedimento — remoto, mediante acesso ao site do iCloud/Mi Cloud com login e senha da própria parte.</p>
        <p>Transcorrido o prazo sem a desativação, o pedido foi cancelado automaticamente pelo sistema, com indicação clara do motivo da rejeição. Entende a PITZI ter agido com clareza e boa-fé, permanecendo o plano ativo e habilitado para novo pedido, desde que cumprida a exigência de desvinculação da conta.</p>` },
  ]
});

addMotivo({

<script>

  {key:'nome', label:'Nome completo do consumidor', type:'text'},

  {key:'dataAquisicao', label:'Data de aquisição do plano', type:'date'},

  {key:'nomeProcon', label:'PROCON de destino', type:'text', ph:'ex.: PROCON SP'},
  {key:'enderecoProcon', label:'Endereço do PROCON', type:'textarea', ph:'opcional'},
  {key:'faCip', label:'FA / CIP / Nº de atendimento', type:'text'},
  {key:'seguradoras', label:'Seguradoras representadas (institucional)', type:'text', default:'GAZIN, GENERALI e MAPFRE'},
  {key:'assinante', label:'Assinatura', type:'text', default:'Jurídico Pitzi'},
];
const JUDICIAL_FIELDS = [
  {key:'destinatarios', label:'Destinatários (escritório)', type:'text', default:'nreis@viseu.com.br; cadastrodigital@viseu.com.br; gmurakami@viseu.com.br; juridico@pitzi.com.br'},
  {key:'numeroProcesso', label:'Nº do processo (se houver)', type:'text', ph:'opcional'},
  {key:'assinante', label:'Assinatura', type:'text', default:'Jurídico Pitzi'},
];

/* =========================================================================
   ESTADO
   ========================================================================= */
const state = {
  tipo:'procon', motivoId:null, ramoId:null,
  vars:{}, images:{}, editMode:false, search:'', mobileTab:'rail', pendingSlot:null,
};

function currentMotivo(){ return MOTIVOS.find(m=>m.id===state.motivoId) || null; }
function currentRamo(){ const m=currentMotivo(); if(!m) return null; return m.ramos.find(r=>r.id===state.ramoId) || m.ramos[0]; }
function computedVars(){ return Object.assign({}, state.vars, { tratamento: state.tipo==='procon' ? 'consumidora' : 'autora' }); }

function parseMoney(s){
  if(!s) return 0;
  const n = String(s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',', '.');
  const f = parseFloat(n);
  return isNaN(f) ? 0 : f;
}
function formatMoney(n){
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* =========================================================================
   BLOCOS DE DOCUMENTO (cabeçalho / fechamento — comuns a todos os motivos)
   ========================================================================= */
function proconHeader(v, m){
  const endereco = v.enderecoProcon ? esc(v.enderecoProcon).replace(/\n/g,'<br>') : '';
  return `
    <h1 class="doctitle">São Paulo, ${todayLong()}</h1>
    <div class="addr-block">
      <div class="to">À<br>${V(v.nomeProcon,'nome do PROCON')}${endereco?('<br>'+endereco):''}</div>
    </div>
    <p style="font-family:var(--sans);font-size:12.5px;color:var(--ink-3)">FA/CIP/Nº de Atendimento: ${V(v.faCip,'nº do atendimento')}</p>
    <p><b>${V(v.nome,'NOME DO CONSUMIDOR')}</b>, CPF: ${V(v.cpf,'nº do CPF')}, apresentou reclamação em face da fornecedora PITZI REPARAÇÃO E MANUTENÇÃO DE EQUIPAMENTOS ELETRÔNICOS LTDA, CNPJ: 13.403.189/0001-05.</p>
    <h2 class="sec">Sobre a fornecedora</h2>
    ${SOBRE_FORNECEDORA(v)}
    <h2 class="sec">Alegações iniciais</h2>
    <p>${esc(v.alegacao || m.alegacaoDefault)}</p>`;
}

function judicialHeader(v, m){
  return `
    <p style="font-family:var(--sans);font-size:11.5px;color:var(--ink-3)">Para: ${V(v.destinatarios,'e-mails do escritório responsável')}</p>
    <h2 class="sec">Parte autora</h2>
    <div class="kv"><b>Nome:</b><span>${V(v.nome,'nome completo')}</span></div>
    <div class="kv"><b>CPF:</b><span>${V(v.cpf,'nº do CPF')}</span></div>
    <div class="kv"><b>Cadastro:</b><span>${V(v.cadastro,'nº do pedido / order')}</span></div>
    <div class="kv"><b>Source:</b><span>${V(v.source,'loja / canal')}</span></div>
    ${v.numeroProcesso? `<div class="kv"><b>Processo:</b><span>${esc(v.numeroProcesso)}</span></div>`:''}
    <h2 class="sec">Alegações da parte autora</h2>
    <p>${esc(v.alegacao || m.alegacaoDefault)}</p>
    <h2 class="sec">Requisições da parte autora</h2>
    ${reqTable(v)}`;
}

function reqTable(v){
  const dm = parseMoney(v.danosMateriais), dmo = parseMoney(v.danosMorais);
  const total = dm + dmo;
  return `<table class="reqs-table">
    <tr><td>1) Obrigação de fazer</td><td class="v">${v.pedidoObrigacaoFazer? esc(v.pedidoObrigacaoFazer) : '—'}</td></tr>
    <tr><td>2) Danos materiais</td><td class="v">R$ ${v.danosMateriais? esc(v.danosMateriais): '0,00'}</td></tr>
    <tr><td>3) Danos morais</td><td class="v">R$ ${v.danosMorais? esc(v.danosMorais): '0,00'}</td></tr>
    <tr class="total"><td>Total dos pedidos</td><td class="v">R$ ${formatMoney(total)}</td></tr>
  </table>`;

function renderRail(){
  const el = document.getElementById('rail');
  const hadFocus = document.activeElement && document.activeElement.dataset && document.activeElement.dataset.field==='__search';
  const selStart = hadFocus ? document.activeElement.selectionStart : null;

  const groups = {};
  MOTIVOS.forEach(m=>{ (groups[m.grupo] = groups[m.grupo] || []).push(m); });
  const q = state.search.trim().toLowerCase();

  let h = `<div class="rail-head"><input type="search" placeholder="Buscar motivo..." value="${esc(state.search)}" data-field="__search"></div>`;
  Object.keys(groups).forEach(g=>{
    const items = groups[g].filter(m => !q || m.titulo.toLowerCase().includes(q) || m.quandoUsar.toLowerCase().includes(q));
    if(!items.length) return;
    h += `<div class="rail-group"><h4>${esc(g)}</h4>`;
    h += items.map(m=>`
      <div class="rail-item ${m.id===state.motivoId?'active':''}" data-action="select-motivo" data-id="${m.id}">
        <span class="num">${m.numero}</span><span class="lbl">${esc(m.titulo)}</span>
      </div>`).join('');
    h += `</div>`;
  });
  el.innerHTML = h;

  if(hadFocus){
    const inp = el.querySelector('[data-field="__search"]');
    if(inp){ inp.focus(); try{ inp.setSelectionRange(selStart, selStart); }catch(e){} }
  }
}

function fieldHTML(f){
  const val = state.vars[f.key] !== undefined ? state.vars[f.key] : (f.default || '');
  if(f.type==='select'){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o)}" ${o===val?'selected':''}>${esc(o)}</option>`).join('');
    return `<div class="field"><label>${esc(f.label)}</label><select data-field="${f.key}"><option value="">—</option>${opts}</select></div>`;
  }
  if(f.type==='textarea'){
    return `<div class="field"><label>${esc(f.label)}</label><textarea data-field="${f.key}" placeholder="${esc(f.ph||'')}">${esc(val)}</textarea></div>`;
  }
  const type = f.type==='date' ? 'date' : (f.type==='number' ? 'number' : 'text');
  return `<div class="field"><label>${esc(f.label)}</label><input type="${type}" data-field="${f.key}" value="${esc(val)}" placeholder="${esc(f.ph||'')}"></div>`;
}

/* =========================================================================
   EXPORTAÇÃO .DOCX (biblioteca docx.js embutida — 100% local, sem servidor)
   ========================================================================= */
const DOCX_FONT = 'Times New Roman';
const DOCX_SIZE = 24;      // 12pt
const DOCX_SIZE_SM = 20;   // 10pt
const DOCX_LINE = { line: 360, lineRule: 'auto' }; // espaçamento 1,5

function docxRunsFromInline(node){
  const runs = [];
  node.childNodes.forEach(cn=>{
    if(cn.nodeType===3){
      const t = cn.textContent;
      if(t) runs.push(new docx.TextRun({ text:t, font:DOCX_FONT, size:DOCX_SIZE }));
    } else if(cn.nodeType===1){
      const tag = cn.tagName.toLowerCase();
      const bold = tag==='b' || tag==='strong';
      const italics = tag==='i' || tag==='em';
      const isPh = (cn.className||'').includes('ph');
      const t = cn.textContent;
      if(t) runs.push(new docx.TextRun({ text:t, bold, italics, font:DOCX_FONT, size:DOCX_SIZE, color: isPh ? '9C3A47' : undefined }));
    }
  });
  if(!runs.length) runs.push(new docx.TextRun({ text: node.textContent||'', font:DOCX_FONT, size:DOCX_SIZE }));
  return runs;
}

function domToDocxChildren(root){
  const children = [];

  Array.from(root.children).forEach(el=>{
    const cls = el.className || '';
    const tag = el.tagName.toLowerCase();

    if(tag==='h1' && cls.includes('doctitle')){
      children.push(new docx.Paragraph({ alignment: docx.AlignmentType.RIGHT, spacing:{after:240}, children:[ new docx.TextRun({text:el.textContent, bold:true, font:DOCX_FONT, size:DOCX_SIZE}) ] }));
    }
    else if(cls.includes('addr-block')){
      const toEl = el.querySelector('.to');
      const raw = toEl ? toEl.innerHTML : el.innerHTML;
      raw.split(/<br\s*\/?>/i).forEach(line=>{
        const txt = line.replace(/<[^>]+>/g,'').trim();
        if(txt) children.push(new docx.Paragraph({ spacing:{after:40, ...DOCX_LINE}, children:[ new docx.TextRun({text:txt, font:DOCX_FONT, size:DOCX_SIZE}) ] }));
      });
      children.push(new docx.Paragraph({ text:'', spacing:{after:160} }));
    }
    else if(tag==='h2' && cls.includes('sec')){
      children.push(new docx.Paragraph({
        spacing:{ before:260, after:140, ...DOCX_LINE },
        border:{ bottom:{ style:'single', size:4, color:'7A2331' } },
        children:[ new docx.TextRun({ text:el.textContent.toUpperCase(), bold:true, color:'7A2331', font:DOCX_FONT, size:DOCX_SIZE }) ]
      }));
    }
    else if(tag==='h3' && cls.includes('subsec')){
      children.push(new docx.Paragraph({
        spacing:{ before:200, after:100, ...DOCX_LINE },
        children:[ new docx.TextRun({ text:el.textContent, bold:true, italics:true, font:DOCX_FONT, size:DOCX_SIZE }) ]
      }));
    }
    else if(cls.includes('kv')){
      const b = el.querySelector('b');
      const label = b ? b.textContent : '';
      const rest = el.textContent.startsWith(label) ? el.textContent.slice(label.length).trim() : el.textContent.trim();
      children.push(new docx.Paragraph({
        spacing:{ after:70, ...DOCX_LINE },
        children:[ new docx.TextRun({text:label+' ', bold:true, font:DOCX_FONT, size:DOCX_SIZE}), new docx.TextRun({text:rest, font:DOCX_FONT, size:DOCX_SIZE}) ]
      }));
    }
    else if(cls.includes('reqs-table')){
      const rows = [];
      el.querySelectorAll('tr').forEach(tr=>{
        const tds = tr.querySelectorAll('td');
        const isTotal = (tr.className||'').includes('total');
        rows.push(new docx.TableRow({ children:[
          new docx.TableCell({ width:{size:65,type:docx.WidthType.PERCENTAGE}, children:[ new docx.Paragraph({children:[new docx.TextRun({text:tds[0]?tds[0].textContent:'', bold:isTotal, font:DOCX_FONT, size:DOCX_SIZE})]}) ] }),
          new docx.TableCell({ width:{size:35,type:docx.WidthType.PERCENTAGE}, children:[ new docx.Paragraph({alignment:docx.AlignmentType.RIGHT, children:[new docx.TextRun({text:tds[1]?tds[1].textContent:'', bold:isTotal, font:DOCX_FONT, size:DOCX_SIZE})]}) ] }),
        ]}));
      });
      if(rows.length) children.push(new docx.Table({ rows, width:{size:100, type:docx.WidthType.PERCENTAGE} }));
      children.push(new docx.Paragraph({ text:'', spacing:{after:200} }));
    }
    else if(cls.includes('exhibit-filled')){
      const capB = el.querySelector('.cap b');
      const cap = capB ? capB.textContent : '';
      const img = el.querySelector('img');
      children.push(new docx.Paragraph({ spacing:{before:140, after:90, ...DOCX_LINE}, children:[ new docx.TextRun({text:cap, bold:true, italics:true, font:DOCX_FONT, size:DOCX_SIZE_SM}) ] }));
      if(img && img.src && img.src.indexOf('data:')===0){
        try{
          const base64 = img.src.split(',')[1];
          const bin = atob(base64);
          const bytes = new Uint8Array(bin.length);
          for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
          let w = img.naturalWidth || 480, h = img.naturalHeight || 300;
          const maxW = 500;
          if(w > maxW){ h = Math.round(h * (maxW / w)); w = maxW; }
          if(!h || !isFinite(h)) h = 300;
          children.push(new docx.Paragraph({ alignment:docx.AlignmentType.CENTER, spacing:{after:220}, children:[ new docx.ImageRun({ data:bytes, transformation:{ width:w, height:h } }) ] }));
        }catch(e){
          children.push(new docx.Paragraph({ children:[ new docx.TextRun({text:'[imagem não pôde ser incorporada automaticamente]', italics:true, font:DOCX_FONT, size:DOCX_SIZE}) ] }));
        }
      }
    }
    else if(cls.includes('exhibit-box')){
      const lbl = el.querySelector('.lbl');
      const txt = lbl ? lbl.textContent.replace(/\s+/g,' ').trim() : 'Documento pendente de anexação';
      children.push(new docx.Paragraph({
        spacing:{ before:120, after:220, ...DOCX_LINE },
        border:{ top:{style:'dashed',size:5,color:'A9863F'}, bottom:{style:'dashed',size:5,color:'A9863F'}, left:{style:'dashed',size:5,color:'A9863F'}, right:{style:'dashed',size:5,color:'A9863F'} },
        children:[ new docx.TextRun({ text:'[ '+txt+' — anexar antes de protocolar ]', italics:true, color:'7A2331', font:DOCX_FONT, size:DOCX_SIZE }) ]
      }));
    }
    else if(cls.includes('sign')){
      children.push(new docx.Paragraph({ text:'', spacing:{before:500} }));
      children.push(new docx.Paragraph({ alignment:docx.AlignmentType.CENTER, border:{ bottom:{style:'single',size:4,color:'000000'} }, spacing:{after:60}, children:[ new docx.TextRun({text:'\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0', font:DOCX_FONT, size:DOCX_SIZE}) ] }));
      children.push(new docx.Paragraph({ alignment:docx.AlignmentType.CENTER, children:[ new docx.TextRun({text:el.textContent.trim(), font:DOCX_FONT, size:DOCX_SIZE}) ] }));
    }
    else if(tag==='p'){
      children.push(new docx.Paragraph({
        alignment: docx.AlignmentType.JUSTIFIED,
        spacing:{ after:220, ...DOCX_LINE },
        children: docxRunsFromInline(el)
      }));
    }
    else {
      const t = el.textContent.trim();
      if(t) children.push(new docx.Paragraph({ alignment:docx.AlignmentType.JUSTIFIED, spacing:{after:220, ...DOCX_LINE}, children:[ new docx.TextRun({text:t, font:DOCX_FONT, size:DOCX_SIZE}) ] }));
    }
  });

  return children;
}

async function downloadDocx(btn){
  const page = document.getElementById('thePage');
  if(!page) return;
  const oldTxt = btn ? btn.textContent : '';
  if(btn){ btn.textContent = 'Gerando…'; btn.disabled = true; }
  try{
    if(typeof docx === 'undefined') throw new Error('Biblioteca docx não carregada');
    const children = domToDocxChildren(page);
    const TWIP_2CM = 1134;
    const doc = new docx.Document({
      styles:{ default:{ document:{ run:{ font:DOCX_FONT, size:DOCX_SIZE } } } },
      sections:[{
        properties:{ page:{ margin:{ top:TWIP_2CM, bottom:TWIP_2CM, left:TWIP_2CM+283, right:TWIP_2CM } } },
        children,
      }],
    });
    const blob = await docx.Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const m = currentMotivo();
    const nomeSlug = (state.vars.nome || 'caso').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'caso';
    a.href = url;
    a.download = `Subsidio_${m?m.numero:'00'}_${nomeSlug}.docx`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
    flashBtn(btn, '✓ Baixado');
  }catch(e){
    console.error(e);
    alert('Não foi possível gerar o .docx neste navegador (' + (e && e.message ? e.message : 'erro desconhecido') + '). Use "Copiar" e cole no Word, ou "Imprimir/PDF" como alternativa.');
  }finally{
    if(btn){ btn.disabled = false; if(btn.textContent==='Gerando…') btn.textContent = oldTxt; }
  }
}

function flashBtn(btn, msg){
  if(!btn) return;
  const old = '⬇ Baixar .docx';
  btn.textContent = msg;
  setTimeout(()=>{ btn.textContent = old; }, 2400);
}

function copyDoc(){
  const page = document.getElementById('thePage');
  if(!page) return;
  const range = document.createRange();
  range.selectNodeContents(page);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){ ok = false; }
  sel.removeAllRanges();
  flashToolbarMsg(ok ? '✓ Copiado — cole no Word ou e-mail' : 'Selecione o texto manualmente para copiar');
}

/* =========================================================================
   LISTENERS GLOBAIS (delegação de eventos)
   ========================================================================= */
document.body.addEventListener('input', (e)=>{
  const f = e.target.dataset.field;
  if(!f) return;
  if(f==='__search'){ state.search = e.target.value; renderRail(); return; }
  state.vars[f] = e.target.value;
  if(f==='alegacao') state.vars._alegacaoAuto = false;
  renderDoc();
});

document.body.addEventListener('change', (e)=>{
  const f = e.target.dataset.field;
  if(!f || e.target.tagName!=='SELECT') return;
  state.vars[f] = e.target.value;
  renderDoc();
});

document.body.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  if(action==='select-motivo'){ selectMotivo(btn.dataset.id); }
  else if(action==='select-ramo'){ state.ramoId = btn.dataset.id; renderForm(); renderDoc(); }
  else if(action==='set-tipo'){ state.tipo = btn.dataset.tipo; renderTipoToggle(); renderForm(); renderDoc(); }
  else if(action==='upload-doc'){ state.pendingSlot = btn.dataset.slot; document.getElementById('fileInput').click(); }
  else if(action==='remove-doc'){ delete state.images[btn.dataset.slot]; renderForm(); renderDoc(); }
  else if(action==='toggle-edit'){ state.editMode = !state.editMode; renderDoc(); }
  else if(action==='copy-doc'){ copyDoc(); }
  else if(action==='download-docx'){ downloadDocx(btn); }
  else if(action==='print-doc'){ window.print(); }
  else if(action==='novo-caso'){ if(confirm('Começar um novo caso? Os dados preenchidos e imagens anexadas serão apagados.')) resetCase(); }
  else if(action==='mobile-tab'){ setMobileTab(btn.dataset.tab); }
});

document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file || !state.pendingSlot) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    state.images[state.pendingSlot] = reader.result;
    state.pendingSlot = null;
    renderForm(); renderDoc();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

/* =========================================================================
   BOOT
   ========================================================================= */
function boot(){
  initDefaults();
  renderTipoToggle();
  renderRail();
  renderForm();
  renderDoc();
}
boot();
</script>
</body>
</html>
